  /provider/orders/{order_id}/accept:
    post:
      tags: [Delivery]
      summary: Accept an order as its provider
      description: |
        The request body may be omitted.
        Empty-body requests must still succeed even if a client sends a Content-Type header.
        If the queued order's formal Buyer Context Pack is missing or structurally incomplete,
        the platform must reject the accept, move the order back to awaiting_buyer_context,
        and clear the transport session.
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptOrderRequest'
      responses:
        '200':
          description: Order accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Order is not owned by this provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                provider_forbidden:
                  value:
                    error: provider_forbidden
        '404':
          $ref: '#/components/responses/OrderNotFound'
        '409':
          description: The queued order was reopened because buyer context is incomplete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                buyer_context_incomplete:
                  value:
                    error: buyer_context_incomplete
                    reason: buyer_context_materials_missing
                    rerouted_to_status: awaiting_buyer_context
                    required_step: buyer_context_pack
