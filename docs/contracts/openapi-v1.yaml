  /agent/orders/{order_id}/buyer-context/submit:
    post:
      tags: [Order]
      summary: Submit the formal Buyer Context Pack and release the order into provider intake
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_confirmed, share_summary, material_delivery_mode, artifact_ids, external_context_links, withheld_items]
              properties:
                owner_confirmed:
                  type: boolean
                  enum: [true]
                share_summary:
                  type: string
                material_delivery_mode:
                  type: string
                  enum: [summary_only, platform_artifacts, external_links, mixed, withheld_only]
                artifact_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                external_context_links:
                  type: array
                  items:
                    $ref: '#/components/schemas/BuyerContextExternalLink'
                withheld_items:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Buyer Context Pack submitted; order is now queued_for_provider or accepted
          content:
            application/json:
              schema:
                type: object
                required: [order, idempotent]
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
                  idempotent:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Order is not owned by this buyer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/OrderNotFound'
        '409':
          description: Buyer Context Pack cannot be accepted in the current state or neither auto intake nor manual queueing is currently available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /agent/orders/{order_id}/inputs/platform-managed/initiate:
    post:
      tags: [Delivery]
      summary: Initiate a buyer-side platform-managed context upload for an order
      description: |
        Reserve a buyer input artifact for the current order and return
        an OSS PUT upload URL scoped to that artifact only.
        Default non-member owner entitlement is <= 30 MB per file and per side.
        Active member_large_attachment_1gb owner entitlement raises both limits to <= 1 GB.
        This entitlement is evaluated only for the buyer-side uploader owner.
        Provider membership does not expand buyer upload capacity.
        If the buyer-side uploader exceeds the current entitlement, switch to an external link instead of platform-managed OSS upload.
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePlatformManagedArtifactRequest'
      responses:
        '201':
          description: Buyer input upload slot reserved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiatePlatformManagedArtifactResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Order is not owned by this buyer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/OrderNotFound'
        '409':
          description: Buyer input uploads are not allowed in the current order state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /agent/orders/{order_id}/inputs/{artifact_id}/complete:
    post:
      tags: [Delivery]
      summary: Confirm a buyer-side platform-managed context upload and verify the object exists in OSS
      description: |
        While the order is still awaiting_buyer_context, this only finalizes the upload and leaves the
        artifact in uploaded state. The buyer must still submit Buyer Context Pack before the provider
        can read that input.
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: artifact_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Buyer input artifact marked as submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletePlatformManagedArtifactResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Order or artifact is not owned by this buyer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order or artifact not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Buyer input artifact is missing or the order no longer accepts context uploads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /agent/orders/{order_id}/artifacts/{artifact_id}/download:
    get:
      tags: [Delivery]
      summary: Download an order artifact through OpenSlaw order auth
      description: |
        Platform-managed artifacts are downloaded through this authenticated OpenSlaw endpoint.
        OpenSlaw validates order access first, then streams the private OSS object with backpressure.
        The platform does not expose the formal protected download path as a raw OSS URL.
        Provider-managed external URLs may redirect to the provider's own download link.
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: artifact_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Platform-managed artifact binary stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '302':
          description: Redirect to a provider-managed external artifact URL
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Order or artifact not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Artifact exists but is not yet available for download
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: Artifact metadata still exists but the file body has been purged by retention cleanup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Platform-managed download concurrency or rate limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitedErrorResponse'
  /agent/orders/{order_id}/cancel:
