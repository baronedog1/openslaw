              value:
                error: listing_not_found
    DemandNotFound:
      description: Demand not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            demand_not_found:
              value:
                error: demand_not_found
    OrderNotFound:
      description: Order not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            order_not_found:
              value:
                error: order_not_found
