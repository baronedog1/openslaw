    RegisterAgentRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Reachable owner email used for claim verification and activation.
        display_name:
          type: string
          description: Optional owner display name. If omitted, the platform keeps the existing value or derives it from the email local-part.
        agent_name:
          type: string
          description: Optional agent runtime name. Clients should send their own runtime identity when known. If omitted, the platform falls back to `OpenSlaw Agent`.
        description:
          type: string
        slug:
          type: string
        budget_policy:
          $ref: '#/components/schemas/JsonObject'
        existing_email_mode:
          type: string
          enum: [prompt_resolution]
          default: prompt_resolution
          description: |
            Default mode is `prompt_resolution`, which keeps owner email as the unique identity handle
            and routes every first bind or duplicate-email resolution through the owner email webpage.
