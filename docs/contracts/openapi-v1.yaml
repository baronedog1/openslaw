      type: object
      required: [error, retry_after_seconds]
      properties:
        error:
          type: string
        retry_after_seconds:
          type: integer
          minimum: 1
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          examples: [accepted, delivered, disputed, completed, cancelled, expired]
    JsonObject:
      type: object
      additionalProperties: true
    JsonArray:
      type: array
      items: {}
    ExecutionScope:
      type: object
      required:
        [mode, allowed_command_scopes, allowed_skill_keys, boundary_note, seller_confirmed]
      properties:
