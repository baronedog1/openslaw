                  <polyline class="edge-visible" points="${points}" stroke="${color}" stroke-width="${width}" stroke-dasharray="${dash}" marker-end="url(#${previewMarkerIdForColor(color)})"></polyline>
                </g>
              `;
            })
            .join('');

          el.edgeBackgroundLayer.innerHTML = `${previewDefsMarkup}${backgroundLines}`;
          el.edgeLayer.innerHTML = `${previewDefsMarkup}${foregroundLines}`;

          Array.from(el.edgeLayer.querySelectorAll('[data-edge-id]')).forEach((group) => {
            group.addEventListener('click', (event) => {
              event.stopPropagation();
              state.selectedEdgeId = group.dataset.edgeId;
              state.selectedNodeId = null;
              state.selectedNodeIds = [];
              state.connectFrom = null;
              state.rewireEdge = null;
              renderInspector();
              renderEdges();
              renderNodes();
            });
            group.addEventListener('contextmenu', (event) => {
              event.preventDefault();
              event.stopPropagation();
              state.selectedEdgeId = group.dataset.edgeId;
              state.selectedNodeId = null;
              state.selectedNodeIds = [];
              state.connectFrom = null;
              state.rewireEdge = null;
              renderInspector();
              renderEdges();
              renderNodes();
              showContextMenu({ type: 'edge', id: group.dataset.edgeId, x: event.clientX, y: event.clientY });
            });
          });

        }

        function renderNodes() {
          const sorted = [...state.nodes].sort((a, b) => a.z - b.z);
          el.nodeLayer.innerHTML = '';

          sorted.forEach((node) => {
            const wrapper = document.createElement('div');
            const selected = isNodeSelected(node.id);
            const primary = node.id === state.selectedNodeId;
            wrapper.className = `node${selected ? (primary ? ' selected' : ' multi-selected') : ''}`;
            wrapper.dataset.nodeId = node.id;
            wrapper.style.left = `${node.x}px`;
            wrapper.style.top = `${node.y}px`;
            wrapper.style.width = `${node.width}px`;
            wrapper.style.height = `${node.height}px`;
            wrapper.style.zIndex = String(node.z);

            const connectOrigin = state.connectFrom && state.connectFrom.nodeId === node.id ? state.connectFrom.side : null;
            wrapper.innerHTML = `
              <div class="node-frame">
                <div class="node-label">${escapeHtml(node.fileName)}</div>
                <div class="node-body">${getInteractiveNodeSvg(node)}</div>
                <button class="port ${connectOrigin === 'top' ? 'connect-origin' : ''}" data-side="top" type="button" aria-label="top"></button>
                <button class="port ${connectOrigin === 'right' ? 'connect-origin' : ''}" data-side="right" type="button" aria-label="right"></button>
                <button class="port ${connectOrigin === 'bottom' ? 'connect-origin' : ''}" data-side="bottom" type="button" aria-label="bottom"></button>
                <button class="port ${connectOrigin === 'left' ? 'connect-origin' : ''}" data-side="left" type="button" aria-label="left"></button>
                <div class="resize-handle" title="缩放"></div>
              </div>
            `;

            const nodeBody = wrapper.querySelector('.node-body');
            nodeBody.addEventListener('pointerdown', startNodeDrag);
            nodeBody.addEventListener('pointerdown', startTextRunDrag, true);
            nodeBody.addEventListener('pointerdown', startSubitemDrag, true);
            nodeBody.addEventListener('dblclick', handleNodeBodyDblClick, true);
            wrapper.querySelector('.resize-handle').addEventListener('pointerdown', startResize);
            wrapper.querySelectorAll('.port').forEach((port) => port.addEventListener('click', onPortClick));
            wrapper.addEventListener('mousedown', (event) => {
              if (event.target.closest('[data-text-run-index]') || event.target.closest('[data-subitem-index]')) return;
              if (event.target.closest('.port') || event.target.closest('.resize-handle')) return;
              if (state.marqueeActive || state.suppressNextNodeClick) return;
              if (isCanvasLikeNode(node)) return;
              if (event.shiftKey) return;
              event.stopPropagation();
              if (!isNodeSelected(node.id) || selectedNodeIds().length <= 1) {
                setSingleNodeSelection(node.id);
              }
              hideContextMenu();
              renderNodes();
              renderInspector();
              saveState();
            });
            wrapper.addEventListener('click', (event) => {
              if (event.target.closest('[data-text-run-index]') || event.target.closest('[data-subitem-index]')) return;
              if (event.target.closest('.port') || event.target.closest('.resize-handle')) return;
              if (state.marqueeActive || state.suppressNextNodeClick) return;
              if (!event.shiftKey) return;
              event.stopPropagation();
              toggleNodeSelection(node.id);
              hideContextMenu();
              renderNodes();
              renderInspector();
              saveState();
            });
            wrapper.addEventListener('contextmenu', (event) => {
              if (event.target.closest('[data-text-run-index]') || event.target.closest('[data-subitem-index]')) return;
              if (event.target.closest('.port') || event.target.closest('.resize-handle')) return;
              event.preventDefault();
              event.stopPropagation();
              if (!isNodeSelected(node.id)) {
                setSingleNodeSelection(node.id);
              }
              renderNodes();
              renderInspector();
              showContextMenu({ type: 'node', id: node.id, x: event.clientX, y: event.clientY });
            });
            el.nodeLayer.appendChild(wrapper);
          });

          el.workspaceCanvas.classList.toggle('connect-mode', state.connectMode);
        }

        function renderPalette() {
          const keyword = el.assetSearchInput.value.trim().toLowerCase();
          const entries = [...assets.values()].filter((asset) => {
            if (asset.kind === 'scene' && asset.aliasFor) return false;
            if (!keyword) return true;
            return asset.fileName.toLowerCase().includes(keyword) || asset.title.toLowerCase().includes(keyword);
          });

          if (!entries.length) {
            el.assetList.innerHTML = '<div class="empty-state">没有匹配的 SVG。</div>';
            return;
          }

          el.assetList.innerHTML = '';
          entries.forEach((asset) => {
            const isEditableTemplate = asset.kind === 'scene' || editableSceneAlias.has(asset.fileName) || isTopLevelFigureAsset(asset);
            const card = document.createElement('article');
            card.className = 'asset-card';
            card.draggable = true;
            card.dataset.assetId = asset.id;
            card.innerHTML = `
              <header>
                <div>
                  <h3>${escapeHtml(asset.fileName)}</h3>
                  <div class="meta">${isEditableTemplate ? '可编辑模板' : asset.source === 'builtin' ? '内置素材' : '本地导入'}</div>
                </div>
                <span class="pill">${escapeHtml(asset.title)}</span>
              </header>
              <div class="asset-preview">${asset.svg}</div>
              <div class="asset-actions">
                <button type="button" data-action="insert">${isEditableTemplate ? '插入可编辑版' : '插入画布'}</button>
                <button type="button" data-action="preview">复制文件名</button>
              </div>
            `;
            card.addEventListener('dragstart', (event) => {
              event.dataTransfer.setData('text/plain', asset.id);
            });
            card.querySelector('[data-action="insert"]').addEventListener('click', () => addNodeFromAsset(asset.id));
            card.querySelector('[data-action="preview"]').addEventListener('click', async () => {
              await navigator.clipboard.writeText(asset.fileName);
              setStatus(`已复制：${asset.fileName}`);
            });
            el.assetList.appendChild(card);
          });
        }

        function renderInspector() {
          const selectedIds = selectedNodeIds();
          if (selectedIds.length > 1) {
            el.inspectorBody.innerHTML = `
              <div class="inspector-section">
                <div class="pill">多选</div>
                <div class="hint">已选中 ${selectedIds.length} 个组件。拖动其中任意一个会整体移动；按 Delete 会一起删除。</div>
              </div>
              <div class="inspector-section">
                <div class="field-row">
                  <button id="multiSendBackBtn">置底</button>
                  <button id="multiBackwardBtn">下移一层</button>
                  <button id="multiForwardBtn">上移一层</button>
                  <button id="multiBringFrontBtn">置顶</button>
                </div>
              </div>
              <div class="inspector-section">
                <div class="empty-state">提示：在画布空白处拖出框选区域可一次选中多个组件；按住 Shift 从组件上拖动也能拉出框选区域。</div>
              </div>
            `;
            document.getElementById('multiSendBackBtn').addEventListener('click', () => reorderSelectedNodes('back'));
            document.getElementById('multiBackwardBtn').addEventListener('click', () => reorderSelectedNodes('backward'));
            document.getElementById('multiForwardBtn').addEventListener('click', () => reorderSelectedNodes('forward'));
            document.getElementById('multiBringFrontBtn').addEventListener('click', () => reorderSelectedNodes('front'));
            return;
          }

          if (state.selectedNodeId) {
            const node = state.nodes.find((item) => item.id === state.selectedNodeId);
            if (!node) {
              state.selectedNodeId = null;
              renderInspector();
              return;
            }
            const textRuns = Array.isArray(node.textRuns) ? node.textRuns : [];
            const textEditorMarkup = textRuns.length
              ? `
              <div class="inspector-section">
                <div class="pill">文字</div>
                <div class="hint">下面这些文本会直接回写到当前组件 SVG。</div>
                <div class="inspector-grid">
                  ${textRuns
                    .map((run, index) => `
                      <div class="field" style="grid-column: 1 / -1;">
                        <label>文本 ${index + 1}</label>
                        <textarea id="nodeText_${index}" rows="2">${escapeHtml(run.value)}</textarea>
                      </div>`)
                    .join('')}
                </div>
              </div>`
              : '';
            el.inspectorBody.innerHTML = `
              <div class="inspector-section">
                <div class="pill">组件</div>
                <div class="hint">${escapeHtml(node.fileName)}</div>
              </div>
              <div class="inspector-section">
                <div class="inspector-grid">
                  <div class="field">
                    <label>X</label>
                    <input type="number" id="nodeX" value="${Math.round(node.x)}" />
                  </div>
                  <div class="field">
                    <label>Y</label>
                    <input type="number" id="nodeY" value="${Math.round(node.y)}" />
                  </div>
                  <div class="field">
                    <label>宽</label>
                    <input type="number" id="nodeW" value="${Math.round(node.width)}" />
                  </div>
                  <div class="field">
                    <label>高</label>
                    <input type="number" id="nodeH" value="${Math.round(node.height)}" disabled />
                  </div>
                </div>
                <div class="field-row">
                  <button id="applyNodePropsBtn" class="primary">应用</button>
                  <button id="duplicateNodeBtnInline">复制</button>
                </div>
              </div>
              ${textEditorMarkup}
              <div class="inspector-section">
                <div class="field-row">
                  <button id="nodeSendBackBtn">置底</button>
                  <button id="nodeBackwardBtn">下移一层</button>
                  <button id="nodeForwardBtn">上移一层</button>
                  <button id="nodeBringFrontBtn">置顶</button>
                </div>
              </div>
              <div class="inspector-section">
                <div class="empty-state">提示：拖动画布上的组件可移动；拖右下角手柄可等比缩放；直接连续点击两个四边中点即可生成箭头连线。</div>
              </div>
            `;

            document.getElementById('applyNodePropsBtn').addEventListener('click', () => {
              const x = Number(document.getElementById('nodeX').value || node.x);
              const y = Number(document.getElementById('nodeY').value || node.y);
              const width = Math.max(120, Number(document.getElementById('nodeW').value || node.width));
              node.x = clamp(x, 0, CANVAS_WIDTH - width);
              node.y = clamp(y, 0, CANVAS_HEIGHT - width / node.ratio);
              node.width = width;
              node.height = Math.round(width / node.ratio);
              if (Array.isArray(node.textRuns) && node.textRuns.length) {
                node.textRuns = node.textRuns.map((run, index) => ({
                  ...run,
                  value: document.getElementById(`nodeText_${index}`)?.value ?? run.value,
                }));
                node.svg = getRenderedNodeSvg(node);
              }
              persistAndRender();
            });
            document.getElementById('duplicateNodeBtnInline').addEventListener('click', duplicateSelectedNode);
            document.getElementById('nodeSendBackBtn').addEventListener('click', () => reorderSelectedNodes('back'));
            document.getElementById('nodeBackwardBtn').addEventListener('click', () => reorderSelectedNodes('backward'));
            document.getElementById('nodeForwardBtn').addEventListener('click', () => reorderSelectedNodes('forward'));
            document.getElementById('nodeBringFrontBtn').addEventListener('click', () => reorderSelectedNodes('front'));
            return;
          }

          if (state.selectedEdgeId) {
            const edge = state.edges.find((item) => item.id === state.selectedEdgeId);
            if (!edge) {
              state.selectedEdgeId = null;
              renderInspector();
              return;
            }
            el.inspectorBody.innerHTML = `
              <div class="inspector-section">
                <div class="pill">连线</div>
                <div class="hint">起点：${escapeHtml(edge.from.nodeId)} / ${edge.from.side}<br />终点：${escapeHtml(edge.to.nodeId)} / ${edge.to.side}</div>
              </div>
              <div class="inspector-section">
                <div class="field">
                  <label>颜色</label>
                  <select id="edgeColorSelect">
                    <option value="#3f6e8c"${edge.color === '#3f6e8c' ? ' selected' : ''}>蓝色</option>
                    <option value="#c8734e"${edge.color === '#c8734e' ? ' selected' : ''}>橙色</option>
                    <option value="#b9645d"${edge.color === '#b9645d' ? ' selected' : ''}>红色</option>
                    <option value="#7a9984"${edge.color === '#7a9984' ? ' selected' : ''}>绿色</option>
                  </select>
                </div>
                <div class="field">
                  <label>粗细</label>
                  <input id="edgeWidthInput" type="number" min="2" max="12" step="1" value="${Math.round(Number(edge.width || 4))}" />
                </div>
                <div class="field">
                  <label><input id="edgeDashCheckbox" type="checkbox"${edge.dashed ? ' checked' : ''} /> 虚线</label>
                </div>
                <div class="field-row">
                  <button id="applyEdgePropsBtn" class="primary">应用</button>
                  <button id="rewireEdgeFromBtn">重连起点</button>
                  <button id="rewireEdgeToBtn">重连终点</button>
                  <button id="deleteEdgeBtn" class="danger">删除</button>
                </div>
              </div>
            `;
            document.getElementById('applyEdgePropsBtn').addEventListener('click', () => {
              edge.color = document.getElementById('edgeColorSelect').value;
              edge.width = Number(document.getElementById('edgeWidthInput').value || edge.width || 4);
              edge.dashed = document.getElementById('edgeDashCheckbox').checked;
              persistAndRender();
            });
            document.getElementById('rewireEdgeFromBtn').addEventListener('click', () => {
              state.rewireEdge = { edgeId: edge.id, endpoint: 'from' };
              state.connectMode = true;
              state.connectFrom = null;
              updateModeUi();
              renderNodes();
              renderInspector();
              setStatus('请选择新的起点端口。');
            });
            document.getElementById('rewireEdgeToBtn').addEventListener('click', () => {
              state.rewireEdge = { edgeId: edge.id, endpoint: 'to' };
              state.connectMode = true;
              state.connectFrom = null;
              updateModeUi();
              renderNodes();
              renderInspector();
              setStatus('请选择新的终点端口。');
            });
            document.getElementById('deleteEdgeBtn').addEventListener('click', removeSelected);
            return;
          }

          el.inspectorBody.innerHTML = `
            <div class="empty-state">
              还没有选中对象。<br />
              1. 从左侧把一个 SVG 插入画布。<br />
              2. 点击组件进行移动或缩放。<br />
              3. 直接连续点击两个四边中点创建连线；“连线模式”按钮只是可选辅助，不是前置条件。
            </div>
          `;
        }

        function setStatus(message) {
          el.workspaceStatus.textContent = message;
        }

        function updateModeUi() {
          el.connectModeBtn.classList.toggle('active', state.connectMode);
          if (state.rewireEdge?.endpoint === 'from') {
            el.connectStatusPill.textContent = '重连起点';
          } else if (state.rewireEdge?.endpoint === 'to') {
            el.connectStatusPill.textContent = '重连终点';
          } else if (state.connectFrom) {
            el.connectStatusPill.textContent = '请选择终点';
          } else {
            el.connectStatusPill.textContent = state.connectMode ? '连线模式' : '普通模式';
          }
          el.workspaceCanvas.classList.toggle('connect-mode', state.connectMode);
        }

        function persistAndRender() {
          saveState();
          renderEdges();
          renderNodes();
          renderInspector();
          renderContextMenu();
          setStatus(`组件 ${state.nodes.length} 个，连线 ${state.edges.length} 条。`);
        }

        function escapeHtml(value) {
          return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;');
        }

        function startNodeDrag(event) {
          if (event.shiftKey) return;
          if (state.marqueeActive || state.suppressNextNodeClick) return;
          event.stopPropagation();
          if (event.target.closest('[data-text-run-index]')) return;
          if (event.target.closest('[data-subitem-index]')) return;
          if (event.target.closest('.port') || event.target.closest('.resize-handle')) return;
          const wrapper = event.currentTarget.closest('.node');
          const nodeId = wrapper.dataset.nodeId;
          const node = state.nodes.find((item) => item.id === nodeId);
          if (!node) return;
          if (isCanvasLikeNode(node)) return;

          if (!isNodeSelected(node.id) || selectedNodeIds().length <= 1) {
            setSingleNodeSelection(node.id);
          }
          hideContextMenu();
          renderNodes();
          renderInspector();
          saveState();

          const startPoint = toCanvasPoint(event.clientX, event.clientY);
          const dragIds = selectedNodeIds();
          const originMap = new Map(
            state.nodes
              .filter((item) => dragIds.includes(item.id))
              .map((item) => [item.id, { x: item.x, y: item.y }]),
          );

          function onMove(moveEvent) {
            const point = toCanvasPoint(moveEvent.clientX, moveEvent.clientY);
            const dx = point.x - startPoint.x;
            const dy = point.y - startPoint.y;
            state.nodes.forEach((item) => {
              const origin = originMap.get(item.id);
              if (!origin) return;
              item.x = clamp(origin.x + dx, 0, CANVAS_WIDTH - item.width);
              item.y = clamp(origin.y + dy, 0, CANVAS_HEIGHT - item.height);
            });
            renderNodes();
            renderEdges();
            renderInspector();
          }

          function onUp() {
            window.removeEventListener('pointermove', onMove);
            window.removeEventListener('pointerup', onUp);
            clearManualPointsForNodeIds(dragIds);
            saveState();
          }

          window.addEventListener('pointermove', onMove);
          window.addEventListener('pointerup', onUp, { once: true });
        }

        function startResize(event) {
          event.stopPropagation();
          const wrapper = event.currentTarget.closest('.node');
          const nodeId = wrapper.dataset.nodeId;
          const node = state.nodes.find((item) => item.id === nodeId);
          if (!node) return;

          const startPoint = toCanvasPoint(event.clientX, event.clientY);
          const originWidth = node.width;

          function onMove(moveEvent) {
            const point = toCanvasPoint(moveEvent.clientX, moveEvent.clientY);
            const width = Math.max(120, originWidth + (point.x - startPoint.x));
            node.width = Math.round(width);
            node.height = Math.round(width / node.ratio);
            renderNodes();
            renderEdges();
            renderInspector();
          }

          function onUp() {
            window.removeEventListener('pointermove', onMove);
            window.removeEventListener('pointerup', onUp);
            clearManualPointsForNodeIds([node.id]);
            saveState();
          }

          window.addEventListener('pointermove', onMove);
          window.addEventListener('pointerup', onUp, { once: true });
        }

        function onPortClick(event) {
          event.stopPropagation();
          hideContextMenu();
          const wrapper = event.currentTarget.closest('.node');
          const nodeId = wrapper.dataset.nodeId;
          const side = event.currentTarget.dataset.side;
          if (state.rewireEdge) {
            const edge = state.edges.find((item) => item.id === state.rewireEdge.edgeId);
            if (!edge) {
              state.rewireEdge = null;
              state.connectMode = false;
              updateModeUi();
              persistAndRender();
              return;
            }
            edge[state.rewireEdge.endpoint] = { nodeId, side };
            edge.manualPoints = null;
            edge.renderMode = 'foreground';
            state.rewireEdge = null;
            state.connectMode = false;
            state.connectFrom = null;
            updateModeUi();
            persistAndRender();
            return;
          }
          if (!state.connectMode && !state.connectFrom) {
            state.connectMode = true;
            state.connectFrom = { nodeId, side };
            updateModeUi();
            renderNodes();
            renderInspector();
            return;
          }
          if (!state.connectMode) return;
          if (!state.connectFrom) {
            state.connectFrom = { nodeId, side };
            updateModeUi();
            renderNodes();
            renderInspector();
            return;
          }
          if (state.connectFrom.nodeId === nodeId && state.connectFrom.side === side) {
            state.connectFrom = null;
            state.connectMode = false;
            updateModeUi();
            renderNodes();
            renderInspector();
            return;
          }
          const createdEdge = {
            id: uid('edge'),
            from: state.connectFrom,
            to: { nodeId, side },
            color: '#3f6e8c',
            width: 4,
            dashed: false,
            renderMode: 'foreground',
            manualPoints: null,
          };
          state.edges.push(createdEdge);
          state.selectedEdgeId = createdEdge.id;
          state.selectedNodeId = null;
          state.selectedNodeIds = [];
          state.connectFrom = null;
          state.connectMode = false;
          updateModeUi();
          persistAndRender();
        }

        function exportSceneJson() {
          const exportBounds = sceneExportBounds();
          const scene = {
            canvas: { width: CANVAS_WIDTH, height: CANVAS_HEIGHT },
            export_bounds: exportBounds,
            nodes: state.nodes,
            edges: state.edges,
          };
          downloadText('figure-canvas-scene.json', JSON.stringify(scene, null, 2), 'application/json;charset=utf-8');
        }

        function importSceneJson(file) {
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const scene = JSON.parse(reader.result);
              if (scene?.type === 'openslaw_figure_scene_template' && Array.isArray(scene.nodes)) {
                state.nodes = [];
                state.edges = [];
                state.selectedNodeId = null;
                state.selectedNodeIds = [];
                state.selectedEdgeId = null;
                state.connectFrom = null;
                addSceneFromTemplate(scene, 120, 120);
                persistAndRender();
                return;
              }
              state.nodes = Array.isArray(scene.nodes) ? scene.nodes : [];
              state.edges = Array.isArray(scene.edges) ? scene.edges : [];
              state.selectedNodeId = null;
              state.selectedNodeIds = [];
              state.selectedEdgeId = null;
              state.connectFrom = null;
              state.zCounter = state.nodes.reduce((max, node) => Math.max(max, Number(node.z || 1)), 1);
              persistAndRender();
            } catch (error) {
              alert('JSON 读取失败，请检查文件内容。');
            }
          };
          reader.readAsText(file, 'utf8');
        }

        function importSvgFiles(files) {
          Array.from(files).forEach((file) => {
            if (!file.name.toLowerCase().endsWith('.svg')) return;
            const reader = new FileReader();
            reader.onload = () => {
              const assetId = `upload:${++state.assetCounter}:${file.name}`;
              registerAsset({
                id: assetId,
                fileName: file.name,
                title: file.name.replace(/\.svg$/i, ''),
                svg: String(reader.result),
                source: 'upload',
              });
              renderPalette();
              addNodeFromAsset(assetId);
            };
            reader.readAsText(file, 'utf8');
          });
        }

        function exportSceneSvg() {
          const svg = buildSceneSvgString();
          downloadText('figure-canvas-scene.svg', svg, 'image/svg+xml;charset=utf-8');
        }

        function parsedPolylinePoints(pointsValue) {
          return String(pointsValue || '')
            .trim()
            .split(/\s+/)
            .map((pair) => pair.split(',').map(Number))
            .filter((pair) => pair.length === 2 && pair.every(Number.isFinite))
            .map(([x, y]) => ({ x, y }));
        }

        function sceneExportBounds(padding = 24) {
          const exportFrames = state.nodes.filter((node) => isCanvasLikeNode(node));
          if (exportFrames.length) {
            const minX = Math.min(...exportFrames.map((node) => node.x));
            const minY = Math.min(...exportFrames.map((node) => node.y));
            const maxX = Math.max(...exportFrames.map((node) => node.x + node.width));
            const maxY = Math.max(...exportFrames.map((node) => node.y + node.height));
            return {
              minX,
              minY,
              width: Math.max(24, maxX - minX),
              height: Math.max(24, maxY - minY),
              padding,
            };
          }
          const xs = [];
          const ys = [];
          state.nodes.forEach((node) => {
            xs.push(node.x, node.x + node.width);
            ys.push(node.y, node.y + node.height);
          });
          state.edges.forEach((edge) => {
            parsedPolylinePoints(polylinePoints(edge)).forEach((point) => {
              xs.push(point.x);
              ys.push(point.y);
            });
          });
          if (!xs.length || !ys.length) {
            return { minX: 0, minY: 0, width: CANVAS_WIDTH, height: CANVAS_HEIGHT, padding };
          }
          const minX = Math.min(...xs);
          const minY = Math.min(...ys);
          const maxX = Math.max(...xs);
          const maxY = Math.max(...ys);
          return {
            minX,
            minY,
            width: Math.max(24, maxX - minX),
            height: Math.max(24, maxY - minY),
            padding,
          };
        }

        function markerIdForColor(color) {
          return `canvasArrowExport-${String(color || '#3f6e8c').replace(/[^a-zA-Z0-9_-]/g, '_')}`;
        }

        function buildEdgeDefs(edges) {
          const colors = [...new Set(edges.map((edge) => edge.color || '#3f6e8c'))];
          return colors
            .map((color) => `
    <marker id="${markerIdForColor(color)}" viewBox="0 0 8 8" refX="6.2" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="${color}"></path>
    </marker>`)
            .join('\n');
        }

        function buildEdgeMarkup(mode) {
          return state.edges
            .filter((edge) => (mode === 'background' ? edge.renderMode === 'background' : edge.renderMode !== 'background'))
            .map((edge) => {
              const points = polylinePoints(edge);
              if (!points) return '';
              const color = edge.color || '#3f6e8c';
              const dash = edge.dashed ? '10 10' : '';
              const width = Number(edge.width || 4);
              return `<polyline points="${points}" fill="none" stroke="${color}" stroke-width="${width}" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="${dash}" marker-end="url(#${markerIdForColor(color)})"></polyline>`;
            })
            .join('\n');
        }

        function buildSceneSvgString() {
          const backgroundEdgeMarkup = buildEdgeMarkup('background');
          const foregroundEdgeMarkup = buildEdgeMarkup('foreground');
          const defsMarkup = buildEdgeDefs(state.edges);
          const bounds = sceneExportBounds();
          const exportWidth = Math.ceil(bounds.width + bounds.padding * 2);
          const exportHeight = Math.ceil(bounds.height + bounds.padding * 2);
          const offsetX = bounds.padding - bounds.minX;
          const offsetY = bounds.padding - bounds.minY;

          const nodeMarkup = state.nodes
            .slice()
            .sort((a, b) => a.z - b.z)
            .map((node) => {
              const doc = new DOMParser().parseFromString(getRenderedNodeSvg(node), 'image/svg+xml');
              const root = doc.documentElement;
              root.setAttribute('x', node.x);
              root.setAttribute('y', node.y);
              root.setAttribute('width', node.width);
              root.setAttribute('height', node.height);
              root.setAttribute('preserveAspectRatio', 'xMidYMid meet');
              return root.outerHTML;
            })
            .join('\n');

          const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${exportWidth}" height="${exportHeight}" viewBox="0 0 ${exportWidth} ${exportHeight}">
  <defs>
${defsMarkup}
  </defs>
  <rect x="0" y="0" width="${exportWidth}" height="${exportHeight}" fill="#f7f0e4"></rect>
  <g transform="translate(${offsetX}, ${offsetY})">
  ${backgroundEdgeMarkup}
  ${nodeMarkup}
  ${foregroundEdgeMarkup}
  </g>
</svg>`;
          return svg;
        }

        async function exportScenePng() {
          const svg = buildSceneSvgString();
          const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const image = new Image();
          image.decoding = 'async';
          image.onload = () => {
            const exportWidth = image.naturalWidth || image.width || CANVAS_WIDTH;
            const exportHeight = image.naturalHeight || image.height || CANVAS_HEIGHT;
            const canvas = document.createElement('canvas');
            canvas.width = exportWidth;
            canvas.height = exportHeight;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f7f0e4';
            ctx.fillRect(0, 0, exportWidth, exportHeight);
            ctx.drawImage(image, 0, 0, exportWidth, exportHeight);
            URL.revokeObjectURL(url);
            canvas.toBlob((pngBlob) => {
              if (!pngBlob) {
                setStatus('导出 PNG 失败。');
                return;
              }
              const pngUrl = URL.createObjectURL(pngBlob);
              const anchor = document.createElement('a');
              anchor.href = pngUrl;
              anchor.download = 'figure-canvas-scene.png';
              anchor.click();
              URL.revokeObjectURL(pngUrl);
            }, 'image/png');
          };
          image.onerror = () => {
            URL.revokeObjectURL(url);
            setStatus('导出 PNG 失败。');
          };
          image.src = url;
        }

        function startMarqueeSelection(event) {
          if (event.__openslawMarqueeHandled) return;
          event.__openslawMarqueeHandled = true;
          if (state.connectMode || state.rewireEdge) return;
          if (event.button !== 0) return;
          const startedOnNode = event.target.closest('.node');
          const startedNodeId = startedOnNode?.dataset?.nodeId || null;
          const startedNode = startedNodeId ? state.nodes.find((item) => item.id === startedNodeId) : null;
          const startedOnCanvasLikeNode = isCanvasLikeNode(startedNode);
          if (((startedOnNode && !startedOnCanvasLikeNode) && !event.shiftKey) || event.target.closest('[data-edge-id]') || event.target.closest('.port') || event.target.closest('.resize-handle')) return;

          event.preventDefault();
          event.stopPropagation();
          if (typeof el.workspaceViewport.setPointerCapture === 'function' && typeof event.pointerId === 'number') {
            try {
              el.workspaceViewport.setPointerCapture(event.pointerId);
            } catch (error) {
              console.warn('failed to set pointer capture for marquee', error);
            }
          }
          hideContextMenu();
          state.marqueeActive = true;
          const start = toCanvasPoint(event.clientX, event.clientY);
          const moveEventName = event.type === 'mousedown' ? 'mousemove' : 'pointermove';
          const upEventName = event.type === 'mousedown' ? 'mouseup' : 'pointerup';
          el.selectionBox.classList.remove('hidden');
          el.selectionBox.style.left = `${start.x}px`;
          el.selectionBox.style.top = `${start.y}px`;
          el.selectionBox.style.width = '0px';
          el.selectionBox.style.height = '0px';

          function onMove(moveEvent) {
            const point = toCanvasPoint(moveEvent.clientX, moveEvent.clientY);
            const left = Math.min(start.x, point.x);
            const top = Math.min(start.y, point.y);
            const width = Math.abs(point.x - start.x);
            const height = Math.abs(point.y - start.y);
            el.selectionBox.style.left = `${left}px`;
            el.selectionBox.style.top = `${top}px`;
            el.selectionBox.style.width = `${width}px`;
            el.selectionBox.style.height = `${height}px`;
          }

          function onUp(upEvent) {
            window.removeEventListener(moveEventName, onMove);
            window.removeEventListener(upEventName, onUp);
            if (typeof el.workspaceViewport.releasePointerCapture === 'function' && typeof upEvent.pointerId === 'number') {
              try {
                el.workspaceViewport.releasePointerCapture(upEvent.pointerId);
              } catch (error) {
                console.warn('failed to release pointer capture for marquee', error);
              }
            }
            state.marqueeActive = false;
            const point = toCanvasPoint(upEvent.clientX, upEvent.clientY);
            const left = Math.min(start.x, point.x);
            const top = Math.min(start.y, point.y);
            const width = Math.abs(point.x - start.x);
            const height = Math.abs(point.y - start.y);
            el.selectionBox.classList.add('hidden');

            if (width < 6 && height < 6) {
              const target = document.elementFromPoint(upEvent.clientX, upEvent.clientY);
              if (upEvent.shiftKey && target?.closest('.node')) {
                state.skipCanvasClickClear = true;
                state.suppressNextNodeClick = true;
                setTimeout(() => {
                  state.suppressNextNodeClick = false;
                }, 0);
                return;
              }
              setSingleNodeSelection(null);
              state.connectFrom = null;
              state.rewireEdge = null;
              state.skipCanvasClickClear = false;
              renderNodes();
              renderEdges();
              renderInspector();
              return;
            }

            const selectedIds = state.nodes
              .filter((node) => {
                const nodeLeft = node.x;
                const nodeTop = node.y;
                const nodeRight = node.x + node.width;
                const nodeBottom = node.y + node.height;
                return !(nodeRight < left || nodeLeft > left + width || nodeBottom < top || nodeTop > top + height);
              })
              .map((node) => node.id);

            state.selectedNodeIds = upEvent.shiftKey ? [...new Set([...selectedNodeIds(), ...selectedIds])] : selectedIds;
            state.selectedNodeId = state.selectedNodeIds[state.selectedNodeIds.length - 1] || null;
            state.selectedEdgeId = null;
            state.skipCanvasClickClear = true;
            state.suppressNextNodeClick = true;
            setTimeout(() => {
              state.suppressNextNodeClick = false;
            }, 0);
            renderNodes();
            renderEdges();
            renderInspector();
            saveState();
          }

          window.addEventListener(moveEventName, onMove);
          window.addEventListener(upEventName, onUp, { once: true });
        }

        function attachWorkspaceDrop() {
          el.workspaceViewport.addEventListener('mousedown', startMarqueeSelection, true);
          document.addEventListener('mousedown', (event) => {
            if (!el.workspaceViewport.contains(event.target)) return;
            startMarqueeSelection(event);
          }, true);
          el.workspaceViewport.addEventListener('dragover', (event) => {
            event.preventDefault();
          });
          el.workspaceViewport.addEventListener('drop', (event) => {
            event.preventDefault();
            const assetId = event.dataTransfer.getData('text/plain');
            if (assetId && assets.has(assetId)) {
              const point = toCanvasPoint(event.clientX, event.clientY);
              addNodeFromAsset(assetId, point.x - 180, point.y - 90);
              return;
            }
            if (event.dataTransfer.files?.length) {
              handleFiles(event.dataTransfer.files);
            }
          });

          el.workspaceViewport.addEventListener('click', (event) => {
            if (event.target.closest('#contextMenu')) return;
            if (event.target.closest('.node') || event.target.closest('[data-edge-id]') || event.target.closest('.port')) return;
            if (state.skipCanvasClickClear) {
              state.skipCanvasClickClear = false;
              return;
            }
            hideContextMenu();
            state.selectedNodeId = null;
            state.selectedNodeIds = [];
            state.selectedEdgeId = null;
            state.connectFrom = null;
            state.rewireEdge = null;
            renderNodes();
            renderEdges();
            renderInspector();
          });
        }

        function handleFiles(fileList) {
          const files = Array.from(fileList);
          const jsonFiles = files.filter((file) => file.name.toLowerCase().endsWith('.json'));
          const svgFiles = files.filter((file) => file.name.toLowerCase().endsWith('.svg'));
          if (jsonFiles[0]) {
            importSceneJson(jsonFiles[0]);
          }
          if (svgFiles.length) {
            importSvgFiles(svgFiles);
          }
        }

        function bindUi() {
          el.assetSearchInput.addEventListener('input', renderPalette);
          el.connectModeBtn.addEventListener('click', () => {
            state.connectMode = !state.connectMode;
            state.connectFrom = null;
            updateModeUi();
            renderNodes();
            renderInspector();
          });
          el.resetViewBtn.addEventListener('click', () => {
            el.workspaceViewport.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
          });
          el.duplicateNodeBtn.addEventListener('click', duplicateSelectedNode);
          el.deleteSelectedBtn.addEventListener('click', removeSelected);
          el.clearCanvasBtn.addEventListener('click', () => {
            if (confirm('确认清空当前画布？')) clearCanvas();
          });
          el.createTextComponentBtn.addEventListener('click', createTextComponent);
          el.exportJsonBtn.addEventListener('click', exportSceneJson);
          el.exportSvgBtn.addEventListener('click', exportSceneSvg);
          el.exportPngBtn.addEventListener('click', exportScenePng);
          el.importJsonBtn.addEventListener('click', () => {
            el.filePicker.value = '';
            el.filePicker.click();
          });
          el.uploadAssetBtn.addEventListener('click', () => {
            el.filePicker.value = '';
            el.filePicker.click();
          });
          el.filePicker.addEventListener('change', (event) => handleFiles(event.target.files));
          el.textEditApplyBtn.addEventListener('click', () => closeTextEditor(true));
          el.textEditCancelBtn.addEventListener('click', () => closeTextEditor(false));
          el.textEditInput.addEventListener('keydown', (event) => {
            if ((event.key === 'Enter' && (event.metaKey || event.ctrlKey)) || (!event.shiftKey && event.key === 'Enter')) {
              event.preventDefault();
              closeTextEditor(true);
            }
            if (event.key === 'Escape') {
              event.preventDefault();
              closeTextEditor(false);
            }
          });
          document.addEventListener('keydown', (event) => {
            const activeTag = document.activeElement?.tagName || '';
            const activeIsFormField = ['INPUT', 'TEXTAREA', 'SELECT'].includes(activeTag);
            if ((event.ctrlKey || event.metaKey) && !activeIsFormField) {
              const key = String(event.key || '').toLowerCase();
              if (key === 'c') {
                if (selectedNodeIds().length) {
                  event.preventDefault();
                  copySelected();
                }
                return;
              }
              if (key === 'v') {
                if (state.clipboard?.nodes?.length) {
                  event.preventDefault();
                  pasteClipboard();
                }
                return;
              }
            }
            if (event.key === 'Delete' || event.key === 'Backspace') {
              if (activeIsFormField) return;
              removeSelected();
            }
            if (event.key === 'Escape') {
              hideContextMenu();
              closeTextEditor(false);
              state.connectFrom = null;
              state.rewireEdge = null;
              state.connectMode = false;
              updateModeUi();
              renderNodes();
              renderInspector();
            }
          });
          document.addEventListener('click', (event) => {
            if (!el.textEditOverlay.classList.contains('hidden') && !event.target.closest('#textEditOverlay') && !event.target.closest('[data-text-run-index]')) {
              closeTextEditor(true);
            }
            if (event.target.closest('#contextMenu')) return;
            if (state.contextMenu) hideContextMenu();
          });

          ['dragenter', 'dragover'].forEach((eventName) => {
            el.dropzoneBox.addEventListener(eventName, (event) => {
              event.preventDefault();
              el.dropzoneBox.classList.add('dragover');
            });
          });
          ['dragleave', 'drop'].forEach((eventName) => {
            el.dropzoneBox.addEventListener(eventName, (event) => {
              event.preventDefault();
              el.dropzoneBox.classList.remove('dragover');
            });
          });
          el.dropzoneBox.addEventListener('drop', (event) => {
            handleFiles(event.dataTransfer.files);
          });
        }

        initAssets();
        restoreState();
        bindUi();
        renderPalette();
        updateModeUi();
        persistAndRender();
      })();
    </script>
  </body>
</html>
