<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenSlaw Figure Canvas Editor</title>
    <style>
      :root {
        --bg: #f7f0e4;
        --panel: #fff9f1;
        --ink: #1f2a24;
        --muted: #6e726c;
        --line: #cdbda7;
        --accent: #c8734e;
        --accent-soft: #e8c5b5;
        --blue: #3f6e8c;
        --blue-soft: #ddeaf3;
        --gold: #d7a545;
        --gold-soft: #f4e5bf;
        --red: #b9645d;
        --red-soft: #f0d4d1;
        --green: #7a9984;
        --shadow: 0 14px 30px rgba(80, 59, 34, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-columns: 360px 1fr 300px;
        height: 100vh;
        gap: 16px;
        padding: 16px;
      }

      .sidebar,
      .inspector,
      .workspace-shell {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .sidebar,
      .inspector {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-header,
      .inspector-header {
        padding: 18px 18px 14px;
        border-bottom: 1px solid rgba(205, 189, 167, 0.6);
      }

      .sidebar-header h1,
      .inspector-header h2 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.2;
      }

      .sidebar-header p,
      .inspector-header p,
      .hint {
        margin: 0;
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .toolbar,
      .modebar,
      .asset-search,
      .dropzone {
        padding: 14px 18px 0;
      }

      .toolbar-grid,
      .modebar-grid {
        display: grid;
        gap: 10px;
      }

      .toolbar-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .modebar-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .button,
      button {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fffdf8;
        color: var(--ink);
        cursor: pointer;
        padding: 10px 12px;
        transition: 0.18s ease;
      }

      .button:hover,
      button:hover {
        transform: translateY(-1px);
        border-color: var(--accent);
      }

      .button.primary,
      button.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .button.toggle.active,
      button.toggle.active {
        background: var(--blue);
        border-color: var(--blue);
        color: #fff;
      }

      .button.danger,
      button.danger {
        background: #fff6f4;
        border-color: #d8a8a2;
        color: #7b3127;
      }

      .asset-search input,
      .inspector-section input,
      .inspector-section select,
      .inspector-section textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 10px 12px;
      }

      .inspector-section textarea {
        resize: vertical;
        min-height: 76px;
        line-height: 1.5;
      }

      .dropzone {
        padding-bottom: 12px;
      }

      .dropzone-box {
        border: 1px dashed var(--accent-soft);
        background: #fffaf4;
        border-radius: 16px;
        padding: 14px;
        text-align: center;
      }

      .dropzone-box.dragover {
        border-color: var(--accent);
        background: #fff4ea;
      }

      .asset-list {
        flex: 1;
        overflow: auto;
        padding: 12px 18px 18px;
        display: grid;
        gap: 12px;
      }

      .asset-card {
        border: 1px solid rgba(205, 189, 167, 0.7);
        border-radius: 18px;
        padding: 12px;
        background: #fffdf9;
      }

      .asset-card header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: start;
      }

      .asset-card h3 {
        margin: 0;
        font-size: 14px;
        line-height: 1.4;
      }

      .asset-card .meta {
        font-size: 12px;
        color: var(--muted);
      }

      .asset-preview {
        margin: 10px 0 12px;
        height: 120px;
        border-radius: 14px;
        background: linear-gradient(180deg, #fff 0%, #fbf6ec 100%);
        border: 1px solid rgba(205, 189, 167, 0.5);
        overflow: hidden;
      }

      .asset-preview svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .asset-actions {
        display: flex;
        gap: 8px;
      }

      .asset-actions button {
        flex: 1;
      }

      .workspace-shell {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .workspace-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid rgba(205, 189, 167, 0.6);
      }

      .workspace-toolbar h2 {
        margin: 0;
        font-size: 18px;
      }

      .workspace-toolbar .status {
        font-size: 13px;
        color: var(--muted);
      }

      .workspace-viewport {
        position: relative;
        flex: 1;
        overflow: auto;
        background:
          linear-gradient(rgba(205, 189, 167, 0.18) 1px, transparent 1px),
          linear-gradient(90deg, rgba(205, 189, 167, 0.18) 1px, transparent 1px),
          var(--bg);
        background-size: 24px 24px, 24px 24px, auto;
      }

      .workspace-canvas {
        position: relative;
        width: 2600px;
        height: 1800px;
        isolation: isolate;
      }

      .edge-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: visible;
      }

      .edge-layer.background {
        z-index: 5;
      }

      .edge-layer.foreground {
        z-index: 20;
      }

      .edge-hit {
        fill: none;
        stroke: transparent;
        stroke-width: 18;
        pointer-events: stroke;
        cursor: pointer;
      }

      .edge-visible {
        fill: none;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        pointer-events: none;
      }

      .edge-selected .edge-visible {
        filter: drop-shadow(0 0 4px rgba(31, 42, 36, 0.16));
      }

      .node-layer {
        position: absolute;
        inset: 0;
        z-index: 10;
      }

      .node {
        position: absolute;
        user-select: none;
      }

      .node-frame {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 18px;
      }

      .node.selected .node-frame {
        outline: 2px solid var(--accent);
        outline-offset: 4px;
      }

      .node.multi-selected .node-frame {
        outline: 2px solid var(--blue);
        outline-offset: 4px;
      }

      .node-label {
        position: absolute;
        top: -28px;
        left: 0;
        max-width: 100%;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(255, 249, 241, 0.96);
        border: 1px solid rgba(205, 189, 167, 0.8);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.12s ease;
      }

      .node.selected .node-label,
      .node.multi-selected .node-label {
        opacity: 1;
      }

      .node-body {
        width: 100%;
        height: 100%;
        border-radius: 18px;
        overflow: visible;
        background: transparent;
        border: 1px solid transparent;
      }

      .node-body svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .port {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid var(--blue);
        box-shadow: 0 0 0 2px rgba(255, 249, 241, 0.9);
        opacity: 0;
        transition: opacity 0.12s ease;
        cursor: crosshair;
      }

      .workspace-canvas.connect-mode .port,
      .node.selected .port {
        opacity: 1;
      }

      .port[data-side="top"] {
        top: -7px;
        left: calc(50% - 7px);
      }

      .port[data-side="right"] {
        right: -7px;
        top: calc(50% - 7px);
      }

      .port[data-side="bottom"] {
        bottom: -7px;
        left: calc(50% - 7px);
      }

      .port[data-side="left"] {
        left: -7px;
        top: calc(50% - 7px);
      }

      .port.connect-origin {
        background: var(--accent);
        border-color: var(--accent);
      }

      .resize-handle {
        position: absolute;
        width: 16px;
        height: 16px;
        right: -8px;
        bottom: -8px;
        border-radius: 6px;
        background: #fff;
        border: 2px solid var(--accent);
        cursor: nwse-resize;
        opacity: 0;
      }

      .node.selected .resize-handle {
        opacity: 1;
      }

      .selection-box {
        position: absolute;
        border: 1px dashed var(--blue);
        background: rgba(63, 110, 140, 0.12);
        pointer-events: none;
        z-index: 9999;
      }

      .context-menu {
        position: fixed;
        min-width: 240px;
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 249, 241, 0.98);
        border: 1px solid rgba(205, 189, 167, 0.9);
        box-shadow: 0 14px 36px rgba(31, 42, 36, 0.18);
        z-index: 10000;
        display: grid;
        gap: 12px;
      }

      .context-menu-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
      }

      .context-menu .field {
        display: grid;
        gap: 6px;
      }

      .context-menu .field label {
        margin: 0;
      }

      .context-menu .field-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .context-menu .inline-range {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .context-menu .inline-range input[type="range"] {
        flex: 1;
      }

      .context-menu .inline-range output {
        min-width: 24px;
        text-align: right;
        font-size: 12px;
        color: var(--muted);
      }

      .inspector-body {
        flex: 1;
        overflow: auto;
        padding: 16px 18px 20px;
      }

      .inspector-section {
        display: grid;
        gap: 12px;
        margin-bottom: 18px;
      }

      .inspector-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .field label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      .field-row {
        display: flex;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        background: var(--blue-soft);
        color: var(--blue);
        font-size: 12px;
      }

      .empty-state {
        padding: 16px;
        border: 1px dashed rgba(205, 189, 167, 0.7);
        border-radius: 16px;
        background: #fffdf8;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .footer-note {
        padding: 0 18px 18px;
        font-size: 12px;
        line-height: 1.6;
        color: var(--muted);
      }

      .hidden {
        display: none !important;
      }

      .text-edit-overlay {
        position: fixed;
        z-index: 11000;
        min-width: 160px;
        max-width: 420px;
        padding: 10px;
        border-radius: 14px;
        background: rgba(255, 249, 241, 0.98);
        border: 1px solid rgba(205, 189, 167, 0.9);
        box-shadow: 0 14px 36px rgba(31, 42, 36, 0.18);
      }

      .text-edit-overlay textarea {
        width: 100%;
        min-width: 140px;
        min-height: 88px;
        resize: both;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 10px 12px;
        line-height: 1.5;
      }

      .text-edit-actions {
        margin-top: 8px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>Figure Canvas Editor</h1>
          <p>把当前目录里的论文 SVG 当成可拖动组件放进画布。支持移动、缩放、四边中点连线、删除、导出布局。</p>
        </div>

        <div class="toolbar">
          <div class="toolbar-grid">
            <button id="exportJsonBtn">导出 JSON</button>
            <button id="exportSvgBtn">导出 SVG</button>
            <button id="exportPngBtn">导出 PNG</button>
            <button id="importJsonBtn">导入 JSON</button>
            <button id="createTextComponentBtn">新建文字组件</button>
            <button id="clearCanvasBtn" class="danger">清空画布</button>
          </div>
        </div>

        <div class="modebar">
          <div class="modebar-grid">
            <button id="connectModeBtn" class="toggle">连线模式</button>
            <button id="resetViewBtn">回到左上</button>
            <button id="duplicateNodeBtn">复制选中</button>
            <button id="deleteSelectedBtn" class="danger">删除选中</button>
          </div>
        </div>

        <div class="dropzone">
          <div id="dropzoneBox" class="dropzone-box">
            <div class="hint">可以把本地 `.svg` 或画布 `.json` 直接拖到这里，也可以点按钮选择文件。</div>
            <div style="margin-top:10px;">
              <button id="uploadAssetBtn" class="primary">选择本地文件</button>
            </div>
          </div>
          <input id="filePicker" type="file" accept=".svg,.json,image/svg+xml,application/json" multiple class="hidden" />
        </div>

        <div class="asset-search">
          <input id="assetSearchInput" type="search" placeholder="搜索 SVG 文件名" />
        </div>

        <div id="assetList" class="asset-list"></div>

        <div class="footer-note">
          当前目录的内置 SVG 会自动出现在左侧。快捷键：`Ctrl/Cmd + C` 复制，`Ctrl/Cmd + V` 粘贴，`Delete` 删除选中，`Esc` 取消连线起点。
        </div>
      </aside>

      <section class="workspace-shell">
        <div class="workspace-toolbar">
          <div>
            <h2>画布</h2>
            <div class="status" id="workspaceStatus">拖一个 SVG 进来开始排版。</div>
          </div>
          <div class="pill" id="connectStatusPill">普通模式</div>
        </div>

        <div id="workspaceViewport" class="workspace-viewport">
          <div id="workspaceCanvas" class="workspace-canvas">
            <svg id="edgeBackgroundLayer" class="edge-layer background" viewBox="0 0 2600 1800" preserveAspectRatio="none"></svg>
            <div id="nodeLayer" class="node-layer"></div>
            <svg id="edgeLayer" class="edge-layer foreground" viewBox="0 0 2600 1800" preserveAspectRatio="none"></svg>
            <div id="selectionBox" class="selection-box hidden"></div>
          </div>
        </div>
      </section>

      <aside class="inspector">
        <div class="inspector-header">
          <h2>属性</h2>
          <p>选中一个组件或一条连线后，在这里调整。</p>
        </div>
        <div class="inspector-body" id="inspectorBody"></div>
      </aside>
    </div>

    <div id="contextMenu" class="context-menu hidden"></div>
    <div id="textEditOverlay" class="text-edit-overlay hidden">
      <textarea id="textEditInput" spellcheck="false"></textarea>
      <div class="text-edit-actions">
        <button id="textEditCancelBtn" type="button">取消</button>
        <button id="textEditApplyBtn" type="button" class="primary">应用</button>
      </div>
    </div>

        function uid(prefix) {
          if (window.crypto && crypto.randomUUID) {
            return `${prefix}-${crypto.randomUUID()}`;
          }
          return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
        }

        function clamp(value, min, max) {
          return Math.min(max, Math.max(min, value));
        }

        function parseSvgMeta(svgText) {
          const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
          const root = doc.documentElement;
          const viewBox = root.getAttribute('viewBox');
          let width = Number(root.getAttribute('width') || 1600);
          let height = Number(root.getAttribute('height') || 940);
          if (viewBox) {
            const parts = viewBox.trim().split(/\s+/).map(Number);
            if (parts.length === 4 && Number.isFinite(parts[2]) && Number.isFinite(parts[3])) {
              width = parts[2];
              height = parts[3];
            }
          }
          const ratio = width / height || 1;
          return { width, height, ratio, viewBox };
        }

        function parseSvgNumber(value, fallback = null) {
          if (value == null || value === '') return fallback;
          const first = String(value).trim().split(/[\s,]+/).find((token) => token.length);
          const parsed = Number(first);
          return Number.isFinite(parsed) ? parsed : fallback;
        }

        function formatSvgNumber(value) {
          if (!Number.isFinite(value)) return null;
          const rounded = Math.round(value * 100) / 100;
          return Number.isInteger(rounded) ? String(rounded) : String(rounded);
        }

        function extractSvgTextRuns(svgText) {
          const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
          const textElements = Array.from(doc.querySelectorAll('text'));
          const runs = [];
          textElements.forEach((textElement, textIndex) => {
            const textX = parseSvgNumber(textElement.getAttribute('x'), 0);
            const textY = parseSvgNumber(textElement.getAttribute('y'), 0);
            const textAnchor = textElement.getAttribute('text-anchor') || '';
            const tspans = Array.from(textElement.children).filter((child) => child.tagName?.toLowerCase() === 'tspan');
            if (tspans.length) {
              tspans.forEach((tspan, segmentIndex) => {
                runs.push({
                  textIndex,
                  segmentIndex,
                  value: tspan.textContent || '',
                  x: parseSvgNumber(tspan.getAttribute('x'), textX),
                  y: parseSvgNumber(tspan.getAttribute('y'), textY),
                  textAnchor: tspan.getAttribute('text-anchor') || textAnchor,
                });
              });
              return;
            }
            runs.push({
              textIndex,
              segmentIndex: -1,
              value: textElement.textContent || '',
              x: textX,
              y: textY,
              textAnchor,
            });
          });
          return runs;
        }

        function extractSvgSubitems(svgText) {
          const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
          const elements = Array.from(doc.querySelectorAll('[data-editor-subitem]'));
          return elements.map((element, index) => ({
            subIndex: index,
            name: element.getAttribute('data-editor-subitem-name') || `subitem-${index + 1}`,
            baseTransform: element.getAttribute('transform') || '',
            tx: 0,
            ty: 0,
          }));
        }

        function applyTextRunsToSvg(baseSvg, textRuns, options = {}) {
          if (!Array.isArray(textRuns) || !textRuns.length) return baseSvg;
          const doc = new DOMParser().parseFromString(baseSvg, 'image/svg+xml');
          const textElements = Array.from(doc.querySelectorAll('text'));
          if (options.annotate) {
            Array.from(doc.querySelectorAll('[data-text-run-index]')).forEach((element) => {
              element.removeAttribute('data-text-run-index');
              element.removeAttribute('data-text-editable');
            });
          }
          textRuns.forEach((run) => {
            const textElement = textElements[run.textIndex];
            if (!textElement) return;
            if (run.segmentIndex >= 0) {
              const tspans = Array.from(textElement.children).filter((child) => child.tagName?.toLowerCase() === 'tspan');
              if (tspans[run.segmentIndex]) {
                const target = tspans[run.segmentIndex];
                target.textContent = run.value ?? '';
                const x = formatSvgNumber(run.x);
                const y = formatSvgNumber(run.y);
                if (x != null) target.setAttribute('x', x);
                if (y != null) target.setAttribute('y', y);
                if (run.textAnchor) target.setAttribute('text-anchor', run.textAnchor);
                if (options.annotate) {
                  target.setAttribute('data-text-run-index', String(options.annotateIndexMap?.get(run) ?? textRuns.indexOf(run)));
                  target.setAttribute('data-text-editable', 'true');
                }
              }
              return;
            }
            textElement.textContent = run.value ?? '';
            const x = formatSvgNumber(run.x);
            const y = formatSvgNumber(run.y);
            if (x != null) textElement.setAttribute('x', x);
            if (y != null) textElement.setAttribute('y', y);
            if (run.textAnchor) textElement.setAttribute('text-anchor', run.textAnchor);
            if (options.annotate) {
              textElement.setAttribute('data-text-run-index', String(options.annotateIndexMap?.get(run) ?? textRuns.indexOf(run)));
              textElement.setAttribute('data-text-editable', 'true');
            }
          });
          return doc.documentElement.outerHTML;
        }

        function applySubitemsToSvg(baseSvg, subitems, options = {}) {
          if (!Array.isArray(subitems) || !subitems.length) return baseSvg;
          const doc = new DOMParser().parseFromString(baseSvg, 'image/svg+xml');
          const elements = Array.from(doc.querySelectorAll('[data-editor-subitem]'));
          elements.forEach((element, index) => {
            const subitem = subitems[index];
            if (!subitem) return;
            const transforms = [];
            if (subitem.baseTransform) transforms.push(subitem.baseTransform);
            if (Number(subitem.tx) || Number(subitem.ty)) {
              transforms.push(`translate(${formatSvgNumber(Number(subitem.tx) || 0)} ${formatSvgNumber(Number(subitem.ty) || 0)})`);
            }
            if (transforms.length) {
              element.setAttribute('transform', transforms.join(' '));
            } else {
              element.removeAttribute('transform');
            }
            if (options.annotate) {
              element.setAttribute('data-subitem-index', String(index));
              element.setAttribute('data-subitem-name', subitem.name || `subitem-${index + 1}`);
            } else {
              element.removeAttribute('data-subitem-index');
              element.removeAttribute('data-subitem-name');
            }
          });
          return doc.documentElement.outerHTML;
        }

        function ensureNodeEditableContent(node) {
          if (!node) return;
          if (!node.baseSvg) {
            node.baseSvg = node.svg;
          }
          if (!Array.isArray(node.textRuns)) {
            node.textRuns = extractSvgTextRuns(node.baseSvg);
          }
          if (!Array.isArray(node.subitems)) {
            node.subitems = extractSvgSubitems(node.baseSvg);
          }
          if (!node.svg) {
            node.svg = node.baseSvg;
          }
        }

        function getRenderedNodeSvg(node) {
          ensureNodeEditableContent(node);
          if (!node?.baseSvg) return node?.svg || '';
          let svg = node.baseSvg;
          if (Array.isArray(node.subitems) && node.subitems.length) {
            svg = applySubitemsToSvg(svg, node.subitems);
          }
          if (!Array.isArray(node.textRuns) || !node.textRuns.length) return svg;
          return applyTextRunsToSvg(svg, node.textRuns);
        }

        function getInteractiveNodeSvg(node) {
          ensureNodeEditableContent(node);
          if (!node?.baseSvg) return node?.svg || '';
          let svg = node.baseSvg;
          if (Array.isArray(node.subitems) && node.subitems.length) {
            svg = applySubitemsToSvg(svg, node.subitems, { annotate: true });
          }
          if (!Array.isArray(node.textRuns) || !node.textRuns.length) return svg;
          const annotateIndexMap = new Map();
          node.textRuns.forEach((run, index) => annotateIndexMap.set(run, index));
          return applyTextRunsToSvg(svg, node.textRuns, { annotate: true, annotateIndexMap });
        }

        function svgViewBoxMeta(svgElement) {
          if (!svgElement) return { minX: 0, minY: 0, width: 1, height: 1 };
          const viewBox = svgElement.getAttribute('viewBox');
          if (viewBox) {
            const parts = viewBox.trim().split(/\s+/).map(Number);
            if (parts.length === 4 && parts.every(Number.isFinite)) {
              return { minX: parts[0], minY: parts[1], width: parts[2], height: parts[3] };
            }
          }
          const width = Number(svgElement.getAttribute('width') || svgElement.clientWidth || 1);
          const height = Number(svgElement.getAttribute('height') || svgElement.clientHeight || 1);
          return { minX: 0, minY: 0, width, height };
        }

        function closeTextEditor(apply = false) {
          const session = state.textEdit;
          if (!session) return;
          if (apply) {
            const node = state.nodes.find((item) => item.id === session.nodeId);
            const run = node?.textRuns?.[session.runIndex];
            if (node && run) {
              run.value = el.textEditInput.value;
              node.svg = getRenderedNodeSvg(node);
            }
          }
          state.textEdit = null;
          el.textEditOverlay.classList.add('hidden');
          persistAndRender();
        }

        function openTextEditor(nodeId, runIndex, anchorElement) {
          if (state.textEdit) {
            closeTextEditor(true);
          }
          const node = state.nodes.find((item) => item.id === nodeId);
          const run = node?.textRuns?.[runIndex];
          if (!node || !run || !anchorElement) return;
          setSingleNodeSelection(nodeId);
          const rect = anchorElement.getBoundingClientRect();
          const left = clamp(rect.left, 12, window.innerWidth - Math.max(180, rect.width + 32));
          const top = clamp(rect.top - 8, 12, window.innerHeight - 160);
          el.textEditOverlay.style.left = `${left}px`;
          el.textEditOverlay.style.top = `${top}px`;
          el.textEditOverlay.style.width = `${Math.max(180, Math.min(420, rect.width + 56))}px`;
          el.textEditInput.value = run.value ?? '';
          el.textEditOverlay.classList.remove('hidden');
          state.textEdit = { nodeId, runIndex };
          requestAnimationFrame(() => {
            el.textEditInput.focus();
            el.textEditInput.select();
          });
        }

        function startTextRunDrag(event) {
          const target = event.target.closest('[data-text-run-index]');
          if (!target || event.button !== 0) return;
          hideContextMenu();

          const wrapper = event.currentTarget.closest('.node');
          const nodeId = wrapper?.dataset?.nodeId;
          const node = state.nodes.find((item) => item.id === nodeId);
          const runIndex = Number(target.getAttribute('data-text-run-index'));
          const run = node?.textRuns?.[runIndex];
          const svgElement = target.ownerSVGElement || target.closest('svg');
          if (!node || !run || !svgElement || !Number.isFinite(runIndex)) return;

          const view = svgViewBoxMeta(svgElement);
          const rect = svgElement.getBoundingClientRect();
          const scaleX = view.width / Math.max(rect.width, 1);
          const scaleY = view.height / Math.max(rect.height, 1);
          const startClientX = event.clientX;
          const startClientY = event.clientY;
          const originX = Number.isFinite(run.x) ? run.x : 0;
          const originY = Number.isFinite(run.y) ? run.y : 0;
          let dragging = false;

          function onMove(moveEvent) {
            const dx = moveEvent.clientX - startClientX;
            const dy = moveEvent.clientY - startClientY;
            if (!dragging && Math.hypot(dx, dy) < 3) {
              return;
            }
            if (!dragging) {
              dragging = true;
              setSingleNodeSelection(node.id);
              renderNodes();
              renderInspector();
              saveState();
              moveEvent.preventDefault();
              moveEvent.stopPropagation();
              closeTextEditor(false);
            }
            run.x = originX + (moveEvent.clientX - startClientX) * scaleX;
            run.y = originY + (moveEvent.clientY - startClientY) * scaleY;
            node.svg = getRenderedNodeSvg(node);
            renderNodes();
            renderInspector();
          }

          function onUp() {
            window.removeEventListener('pointermove', onMove);
            window.removeEventListener('pointerup', onUp);
            node.svg = getRenderedNodeSvg(node);
            saveState();
          }

          window.addEventListener('pointermove', onMove);
          window.addEventListener('pointerup', onUp, { once: true });
        }

        function startSubitemDrag(event) {
          const textTarget = event.target.closest('[data-text-run-index]');
          if (textTarget) return;
          const target = event.target.closest('[data-subitem-index]');
          if (!target || event.button !== 0) return;
          hideContextMenu();

          const wrapper = event.currentTarget.closest('.node');
          const nodeId = wrapper?.dataset?.nodeId;
          const node = state.nodes.find((item) => item.id === nodeId);
          const subIndex = Number(target.getAttribute('data-subitem-index'));
          const subitem = node?.subitems?.[subIndex];
          const svgElement = target.ownerSVGElement || target.closest('svg');
          if (!node || !subitem || !svgElement || !Number.isFinite(subIndex)) return;

          const view = svgViewBoxMeta(svgElement);
          const rect = svgElement.getBoundingClientRect();
          const scaleX = view.width / Math.max(rect.width, 1);
          const scaleY = view.height / Math.max(rect.height, 1);
          const startClientX = event.clientX;
          const startClientY = event.clientY;
          const originX = Number(subitem.tx) || 0;
          const originY = Number(subitem.ty) || 0;
          let dragging = false;

          function onMove(moveEvent) {
            const dx = moveEvent.clientX - startClientX;
            const dy = moveEvent.clientY - startClientY;
            if (!dragging && Math.hypot(dx, dy) < 3) {
              return;
            }
            if (!dragging) {
              dragging = true;
              setSingleNodeSelection(node.id);
              renderNodes();
              renderInspector();
              saveState();
              moveEvent.preventDefault();
              moveEvent.stopPropagation();
              closeTextEditor(false);
            }
            subitem.tx = originX + (moveEvent.clientX - startClientX) * scaleX;
            subitem.ty = originY + (moveEvent.clientY - startClientY) * scaleY;
            node.svg = getRenderedNodeSvg(node);
            renderNodes();
            renderInspector();
          }

          function onUp() {
            window.removeEventListener('pointermove', onMove);
            window.removeEventListener('pointerup', onUp);
            node.svg = getRenderedNodeSvg(node);
            saveState();
          }

          window.addEventListener('pointermove', onMove);
          window.addEventListener('pointerup', onUp, { once: true });
        }

        function handleNodeBodyDblClick(event) {
          const target = event.target.closest('[data-text-run-index]');
          if (!target) return;
          event.preventDefault();
          event.stopPropagation();
          const wrapper = event.currentTarget.closest('.node');
          const nodeId = wrapper?.dataset?.nodeId;
          const runIndex = Number(target.getAttribute('data-text-run-index'));
          if (!nodeId || !Number.isFinite(runIndex)) return;
          openTextEditor(nodeId, runIndex, target);
        }

        function registerAsset(entry) {
          const meta = parseSvgMeta(entry.svg);
          const asset = {
            ...entry,
            meta,
            kind: entry.kind || 'svg',
          };
          assets.set(entry.id, asset);
          if (entry.aliasFor) {
            editableSceneAlias.set(entry.aliasFor, entry.id);
          }
        }

        function buildTextCardSvg(title = '新组件', body = '双击这里直接编辑文字') {
          return `<svg xmlns="${SVG_NS}" width="420" height="180" viewBox="0 0 420 180">
  <g data-editor-group="component" data-editor-name="text-card">
    <g data-editor-subitem="true" data-editor-subitem-name="card-shell">
      <rect x="12" y="12" width="396" height="156" rx="28" ry="28" fill="#FFF9F1" stroke="#CDBDA7" stroke-width="2.5"/>
    </g>
    <g data-editor-subitem="true" data-editor-subitem-name="card-header">
      <rect x="12" y="12" width="396" height="14" rx="28" ry="28" fill="#C8734E" stroke="none"/>
    </g>
    <g data-editor-subitem="true" data-editor-subitem-name="card-title">
      <text x="210" y="82" text-anchor="middle" font-size="30" font-weight="700" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" fill="#1F2A24">
        <tspan x="210" y="82">${escapeHtml(title)}</tspan>
      </text>
    </g>
    <g data-editor-subitem="true" data-editor-subitem-name="card-body">
      <text x="210" y="122" text-anchor="middle" font-size="21" font-weight="500" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" fill="#6E726C">
        <tspan x="210" y="122">${escapeHtml(body)}</tspan>
      </text>
    </g>
  </g>
</svg>`;
        }

        function cloneNodeForClipboard(node, overrides = {}) {
          return {
            ...node,
            ...overrides,
            textRuns: Array.isArray(node.textRuns) ? node.textRuns.map((run) => ({ ...run })) : [],
            subitems: Array.isArray(node.subitems) ? node.subitems.map((item) => ({ ...item })) : [],
          };
        }

        function copySelected() {
          const selectedIds = selectedNodeIds();
          if (!selectedIds.length) return;
          const selectedSet = new Set(selectedIds);
          const nodes = state.nodes
            .filter((node) => selectedSet.has(node.id))
            .map((node) => cloneNodeForClipboard(node));
          if (!nodes.length) return;
          const minX = Math.min(...nodes.map((node) => node.x));
          const minY = Math.min(...nodes.map((node) => node.y));
          const edges = state.edges
            .filter((edge) => selectedSet.has(edge.from.nodeId) && selectedSet.has(edge.to.nodeId))
            .map((edge) => ({
              ...edge,
              from: { ...edge.from },
              to: { ...edge.to },
              manualPoints: Array.isArray(edge.manualPoints) ? edge.manualPoints.map((point) => ({ ...point })) : null,
            }));

          state.clipboard = {
            nodes: nodes.map((node) => ({
              ...node,
              x: node.x - minX,
              y: node.y - minY,
            })),
            edges: edges.map((edge) => ({
              ...edge,
              manualPoints: Array.isArray(edge.manualPoints)
                ? edge.manualPoints.map((point) => ({
                    x: point.x - minX,
                    y: point.y - minY,
                  }))
                : null,
            })),
            width: Math.max(...nodes.map((node) => node.x + node.width)) - minX,
            height: Math.max(...nodes.map((node) => node.y + node.height)) - minY,
          };
          setStatus(`已复制 ${nodes.length} 个组件。`);
        }

        function pasteClipboard() {
          const clipboard = state.clipboard;
          if (!clipboard?.nodes?.length) return;
          const baseX = clamp((state.lastInsert?.x || 120) + 32, 20, CANVAS_WIDTH - 120);
          const baseY = clamp((state.lastInsert?.y || 120) + 32, 20, CANVAS_HEIGHT - 120);
          const idMap = new Map();
          const pastedIds = [];

          clipboard.nodes.forEach((node) => {
            const cloned = cloneNodeForClipboard(node, {
              id: uid('node'),
              x: clamp(baseX + node.x, 0, CANVAS_WIDTH - node.width),
              y: clamp(baseY + node.y, 0, CANVAS_HEIGHT - node.height),
              z: ++state.zCounter,
            });
            idMap.set(node.id, cloned.id);
            pastedIds.push(cloned.id);
            state.nodes.push(cloned);
          });

          (clipboard.edges || []).forEach((edge) => {
            const fromNodeId = idMap.get(edge.from.nodeId);
            const toNodeId = idMap.get(edge.to.nodeId);
            if (!fromNodeId || !toNodeId) return;
            state.edges.push({
              ...edge,
              id: uid('edge'),
              from: { ...edge.from, nodeId: fromNodeId },
              to: { ...edge.to, nodeId: toNodeId },
              manualPoints: Array.isArray(edge.manualPoints)
                ? edge.manualPoints.map((point) => ({
                    x: baseX + point.x,
                    y: baseY + point.y,
                  }))
                : null,
            });
          });

          state.selectedNodeIds = pastedIds;
          state.selectedNodeId = pastedIds[pastedIds.length - 1] || null;
          state.selectedEdgeId = null;
          state.lastInsert = {
            x: baseX + Math.max(clipboard.width || 0, 120),
            y: baseY,
          };
          hideContextMenu();
          persistAndRender();
        }

        function createTextComponent() {
          const svg = buildTextCardSvg();
          const asset = {
            id: `inline:text-card:${++state.assetCounter}`,
            fileName: 'text-card.svg',
            title: 'text-card',
            svg,
            meta: parseSvgMeta(svg),
            kind: 'svg',
          };
          addNodeFromResolvedAsset(asset);
          persistAndRender();
          setStatus('已创建空白文字组件。');
        }

        function initAssets() {
          builtInAssets.forEach((entry) => {
            registerAsset({
              ...entry,
              id: `builtin:${entry.fileName}`,
              source: 'builtin',
            });
          });
        }

        function downloadText(fileName, content, type = 'text/plain;charset=utf-8') {
          const blob = new Blob([content], { type });
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement('a');
          anchor.href = url;
          anchor.download = fileName;
          anchor.click();
          URL.revokeObjectURL(url);
        }

        function saveState() {
          const payload = {
            nodes: state.nodes,
            edges: state.edges,
            selectedNodeIds: state.selectedNodeIds,
            zCounter: state.zCounter,
            assetCounter: state.assetCounter,
          };
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
          } catch (error) {
            console.warn('failed to persist editor state', error);
          }
        }

        function restoreState() {
          let raw = null;
          try {
            raw = localStorage.getItem(STORAGE_KEY);
          } catch (error) {
            console.warn('failed to access localStorage', error);
            return;
          }
          if (!raw) return;
          try {
            const parsed = JSON.parse(raw);
            state.nodes = Array.isArray(parsed.nodes) ? parsed.nodes : [];
            state.nodes.forEach((node) => ensureNodeEditableContent(node));
            state.edges = Array.isArray(parsed.edges) ? parsed.edges : [];
            state.selectedNodeIds = Array.isArray(parsed.selectedNodeIds) ? parsed.selectedNodeIds : [];
            state.zCounter = Number(parsed.zCounter || 1);
            state.assetCounter = Number(parsed.assetCounter || 0);
          } catch (error) {
            console.warn('failed to restore editor state', error);
          }
        }

        function selectedNodeIds() {
          if (Array.isArray(state.selectedNodeIds) && state.selectedNodeIds.length) {
            return [...new Set(state.selectedNodeIds)];
          }
          return state.selectedNodeId ? [state.selectedNodeId] : [];
        }

        function isNodeSelected(nodeId) {
          return selectedNodeIds().includes(nodeId);
        }

        function setSingleNodeSelection(nodeId) {
          state.selectedNodeId = nodeId;
          state.selectedNodeIds = nodeId ? [nodeId] : [];
          state.selectedEdgeId = null;
        }

        function isCanvasLikeNode(node) {
          if (!node) return false;
          const title = String(node.title || '').toLowerCase();
          const fileName = String(node.fileName || '').toLowerCase();
          return (
            title === 'export-frame' ||
            fileName.includes('#export-frame')
          );
        }

        function toggleNodeSelection(nodeId) {
          const next = new Set(selectedNodeIds());
          if (next.has(nodeId)) {
            next.delete(nodeId);
          } else {
            next.add(nodeId);
          }
          state.selectedNodeIds = [...next];
          state.selectedNodeId = state.selectedNodeIds[state.selectedNodeIds.length - 1] || null;
          state.selectedEdgeId = null;
        }

        function activeNodeIdsForLayerOps() {
          const ids = selectedNodeIds();
          return ids.length ? ids : state.selectedNodeId ? [state.selectedNodeId] : [];
        }

        function normalizeNodeZOrder(ordered = null) {
          const items = ordered || [...state.nodes].sort((a, b) => a.z - b.z);
          items.forEach((node, index) => {
            node.z = index + 1;
          });
          state.zCounter = items.length + 1;
        }

        function fitInsertionAnchor(groupWidth, groupHeight, requestedX = null, requestedY = null) {
          const maxX = Math.max(20, CANVAS_WIDTH - groupWidth - 20);
          const maxY = Math.max(20, CANVAS_HEIGHT - groupHeight - 20);
          let x = requestedX ?? state.lastInsert.x;
          let y = requestedY ?? state.lastInsert.y;

          if (requestedX == null && x > maxX) {
            x = 20;
            y += 120;
          }

          return {
            x: clamp(x, 20, maxX),
            y: clamp(y, 20, maxY),
          };
        }

        function advanceInsertionAnchor(groupWidth, groupHeight, placedX, placedY) {
          const maxX = CANVAS_WIDTH - 200;
          const maxY = CANVAS_HEIGHT - 200;
          let nextX = placedX + groupWidth + 48;
          let nextY = placedY + 48;
          if (nextX > maxX) {
            nextX = 20;
            nextY = placedY + groupHeight + 48;
          }
          state.lastInsert = {
            x: clamp(nextX, 20, maxX),
            y: clamp(nextY, 20, maxY),
          };
        }

        function reorderSelectedNodes(mode) {
          const ids = activeNodeIdsForLayerOps();
          if (!ids.length) return;
          const selected = new Set(ids);
          let ordered = [...state.nodes].sort((a, b) => a.z - b.z);

          if (mode === 'front') {
            ordered = ordered.filter((node) => !selected.has(node.id)).concat(ordered.filter((node) => selected.has(node.id)));
          } else if (mode === 'back') {
            ordered = ordered.filter((node) => selected.has(node.id)).concat(ordered.filter((node) => !selected.has(node.id)));
          } else if (mode === 'forward') {
            for (let index = ordered.length - 2; index >= 0; index -= 1) {
              if (selected.has(ordered[index].id) && !selected.has(ordered[index + 1].id)) {
                [ordered[index], ordered[index + 1]] = [ordered[index + 1], ordered[index]];
              }
            }
          } else if (mode === 'backward') {
            for (let index = 1; index < ordered.length; index += 1) {
              if (selected.has(ordered[index].id) && !selected.has(ordered[index - 1].id)) {
                [ordered[index - 1], ordered[index]] = [ordered[index], ordered[index - 1]];
              }
            }
          }

          normalizeNodeZOrder(ordered);
          persistAndRender();
        }

        function hideContextMenu() {
          state.contextMenu = null;
          el.contextMenu.classList.add('hidden');
          el.contextMenu.innerHTML = '';
        }

        function showContextMenu(payload) {
          state.contextMenu = payload;
          renderContextMenu();
        }

        function renderContextMenu() {
          if (!state.contextMenu) {
            hideContextMenu();
            return;
          }

          if (state.contextMenu.type === 'edge') {
            const edge = state.edges.find((item) => item.id === state.contextMenu.id);
            if (!edge) {
              hideContextMenu();
              return;
            }

            const width = Number(edge.width || 4);
            el.contextMenu.innerHTML = `
              <div class="context-menu-title">线条</div>
              <div class="field">
                <label>颜色</label>
                <input id="ctxEdgeColor" type="color" value="${escapeHtml(edge.color || '#3f6e8c')}" />
              </div>
              <div class="field">
                <label>粗细</label>
                <div class="inline-range">
                  <input id="ctxEdgeWidth" type="range" min="2" max="12" step="1" value="${width}" />
                  <output id="ctxEdgeWidthOutput">${width}</output>
                </div>
              </div>
              <div class="field-row">
                <button id="ctxEdgeSolidBtn"${edge.dashed ? '' : ' class="primary"'}>实线</button>
                <button id="ctxEdgeDashBtn"${edge.dashed ? ' class="primary"' : ''}>虚线</button>
                <button id="ctxEdgeDeleteBtn" class="danger">删除</button>
              </div>
            `;

            const colorInput = document.getElementById('ctxEdgeColor');
            const widthInput = document.getElementById('ctxEdgeWidth');
            const widthOutput = document.getElementById('ctxEdgeWidthOutput');
            colorInput.addEventListener('input', () => {
              edge.color = colorInput.value;
              persistAndRender();
            });
            widthInput.addEventListener('input', () => {
              edge.width = Number(widthInput.value);
              widthOutput.value = widthInput.value;
              widthOutput.textContent = widthInput.value;
              persistAndRender();
            });
            document.getElementById('ctxEdgeSolidBtn').addEventListener('click', () => {
              edge.dashed = false;
              persistAndRender();
            });
            document.getElementById('ctxEdgeDashBtn').addEventListener('click', () => {
              edge.dashed = true;
              persistAndRender();
            });
            document.getElementById('ctxEdgeDeleteBtn').addEventListener('click', () => {
              removeSelected();
              hideContextMenu();
            });
          } else if (state.contextMenu.type === 'node') {
            const node = state.nodes.find((item) => item.id === state.contextMenu.id);
            if (!node) {
              hideContextMenu();
              return;
            }

            el.contextMenu.innerHTML = `
              <div class="context-menu-title">组件层级</div>
              <div class="field-row">
                <button id="ctxNodeBackBtn">置底</button>
                <button id="ctxNodeBackwardBtn">下移一层</button>
                <button id="ctxNodeForwardBtn">上移一层</button>
                <button id="ctxNodeFrontBtn">置顶</button>
              </div>
              <div class="field-row">
                <button id="ctxNodeDuplicateBtn">复制</button>
                <button id="ctxNodeDeleteBtn" class="danger">删除</button>
              </div>
            `;

            document.getElementById('ctxNodeBackBtn').addEventListener('click', () => reorderSelectedNodes('back'));
            document.getElementById('ctxNodeBackwardBtn').addEventListener('click', () => reorderSelectedNodes('backward'));
            document.getElementById('ctxNodeForwardBtn').addEventListener('click', () => reorderSelectedNodes('forward'));
            document.getElementById('ctxNodeFrontBtn').addEventListener('click', () => reorderSelectedNodes('front'));
            document.getElementById('ctxNodeDuplicateBtn').addEventListener('click', () => {
              duplicateSelectedNode();
              hideContextMenu();
            });
            document.getElementById('ctxNodeDeleteBtn').addEventListener('click', () => {
              removeSelected();
              hideContextMenu();
            });
          } else {
            hideContextMenu();
            return;
          }

          el.contextMenu.classList.remove('hidden');
          const rect = el.contextMenu.getBoundingClientRect();
          const left = Math.min(state.contextMenu.x, window.innerWidth - rect.width - 12);
          const top = Math.min(state.contextMenu.y, window.innerHeight - rect.height - 12);
          el.contextMenu.style.left = `${Math.max(12, left)}px`;
          el.contextMenu.style.top = `${Math.max(12, top)}px`;
        }

        function getAsset(assetId) {
          return assets.get(assetId) || null;
        }

        function findAssetByFileName(fileName, predicate = null) {
          for (const asset of assets.values()) {
            if (asset.fileName !== fileName) continue;
            if (!predicate || predicate(asset)) return asset;
          }
          return null;
        }

        function isTopLevelFigureAsset(asset) {
          return Boolean(
            asset &&
            asset.kind === 'svg' &&
            typeof asset.fileName === 'string' &&
            /^fig\d/i.test(asset.fileName) &&
            !asset.fileName.startsWith('components/')
          );
        }

        function ensureMeasureHost(viewBox = null) {
          if (!measureHost) {
            measureHost = document.createElementNS(SVG_NS, 'svg');
            measureHost.setAttribute('xmlns', SVG_NS);
            measureHost.setAttribute('width', '2000');
            measureHost.setAttribute('height', '2000');
            measureHost.style.position = 'fixed';
            measureHost.style.left = '-10000px';
            measureHost.style.top = '-10000px';
            measureHost.style.visibility = 'hidden';
            measureHost.style.pointerEvents = 'none';
            document.body.appendChild(measureHost);
          }
          measureHost.innerHTML = '';
          if (viewBox) {
            measureHost.setAttribute('viewBox', viewBox);
          } else {
            measureHost.removeAttribute('viewBox');
          }
          return measureHost;
        }

        function isBackgroundRect(element, meta) {
          if (!element || element.tagName?.toLowerCase() !== 'rect') return false;
          const x = Number(element.getAttribute('x') || 0);
          const y = Number(element.getAttribute('y') || 0);
          const width = Number(element.getAttribute('width') || 0);
          const height = Number(element.getAttribute('height') || 0);
          const rx = Number(element.getAttribute('rx') || 0);
          return (
            Math.abs(x) < 0.01 &&
            Math.abs(y) < 0.01 &&
            Math.abs(width - meta.width) < 0.5 &&
            Math.abs(height - meta.height) < 0.5 &&
            Math.abs(rx) < 0.5
          );
        }

        function isStrokeGraphicElement(element) {
          if (!element?.tagName) return false;
          const tag = element.tagName.toLowerCase();
          if (!['line', 'polyline', 'path'].includes(tag)) return false;
          const stroke = (element.getAttribute('stroke') || '').trim().toLowerCase();
          const strokeWidth = Number(element.getAttribute('stroke-width') || 0);
          return stroke !== '' && stroke !== 'none' && strokeWidth > 0;
        }

        function isConnectorElement(element) {
          if (!isStrokeGraphicElement(element)) return false;
          return element.hasAttribute('marker-end') || element.hasAttribute('marker-start');
        }

        function getTopLevelSvgChildren(root, meta) {
          return Array.from(root.children).filter((child) => {
            const tag = child.tagName?.toLowerCase();
            if (!tag || tag === 'defs' || tag === 'title') return false;
            if (isBackgroundRect(child, meta)) return false;
            return true;
          });
        }

        function elementBBoxInRoot(root, element, meta) {
          const host = ensureMeasureHost(meta.viewBox);
          const defs = root.querySelector('defs');
          if (defs) {
            host.appendChild(defs.cloneNode(true));
          }
          const clone = element.cloneNode(true);
          host.appendChild(clone);
          try {
            return clone.getBBox();
          } catch (error) {
            return { x: 0, y: 0, width: 10, height: 10 };
          }
        }

        function nodeSvgFromElement(root, element, bbox, padding = 12) {
          const defs = root.querySelector('defs');
          const viewBox = [
            Math.floor(bbox.x - padding),
            Math.floor(bbox.y - padding),
            Math.ceil(Math.max(24, bbox.width + padding * 2)),
            Math.ceil(Math.max(24, bbox.height + padding * 2)),
          ].join(' ');
          return `<svg xmlns="${SVG_NS}" width="${Math.ceil(Math.max(24, bbox.width + padding * 2))}" height="${Math.ceil(Math.max(24, bbox.height + padding * 2))}" viewBox="${viewBox}">${defs ? defs.outerHTML : ''}${element.outerHTML}</svg>`;
        }

        function parsePointList(pointsValue) {
          return String(pointsValue || '')
            .trim()
            .split(/\s+/)
            .map((pair) => pair.split(',').map(Number))
            .filter((pair) => pair.length === 2 && pair.every(Number.isFinite))
            .map(([x, y]) => ({ x, y }));
        }

        function connectorEndpoints(root, element, meta) {
          const tag = element.tagName?.toLowerCase();
          if (tag === 'line') {
            return {
              start: { x: Number(element.getAttribute('x1') || 0), y: Number(element.getAttribute('y1') || 0) },
              end: { x: Number(element.getAttribute('x2') || 0), y: Number(element.getAttribute('y2') || 0) },
            };
          }
          if (tag === 'polyline') {
            const points = parsePointList(element.getAttribute('points'));
            if (points.length >= 2) {
              return { start: points[0], end: points[points.length - 1] };
            }
          }
          if (tag === 'path') {
            const host = ensureMeasureHost(meta.viewBox);
            const defs = root.querySelector('defs');
            if (defs) host.appendChild(defs.cloneNode(true));
            const clone = element.cloneNode(true);
            host.appendChild(clone);
            try {
              const total = clone.getTotalLength();
              const start = clone.getPointAtLength(0);
              const end = clone.getPointAtLength(total);
              return { start: { x: start.x, y: start.y }, end: { x: end.x, y: end.y } };
            } catch (error) {
              return null;
            }
          }
          return null;
        }

        function connectorManualPoints(element) {
          const tag = element.tagName?.toLowerCase();
          if (tag === 'line') {
            return [
              { x: Number(element.getAttribute('x1') || 0), y: Number(element.getAttribute('y1') || 0) },
              { x: Number(element.getAttribute('x2') || 0), y: Number(element.getAttribute('y2') || 0) },
            ];
          }
          if (tag === 'polyline') {
            const points = parsePointList(element.getAttribute('points'));
            return points.length >= 2 ? points : null;
          }
          return null;
        }

        function buildMultiElementSvg(root, elements, bbox, padding = 12) {
          const defs = root.querySelector('defs');
          const viewBox = [
            Math.floor(bbox.x - padding),
            Math.floor(bbox.y - padding),
            Math.ceil(Math.max(24, bbox.width + padding * 2)),
            Math.ceil(Math.max(24, bbox.height + padding * 2)),
          ].join(' ');
          const content = elements.map((element) => element.outerHTML).join('');
          return `<svg xmlns="${SVG_NS}" width="${Math.ceil(Math.max(24, bbox.width + padding * 2))}" height="${Math.ceil(Math.max(24, bbox.height + padding * 2))}" viewBox="${viewBox}">${defs ? defs.outerHTML : ''}${content}</svg>`;
        }

        function strokeBlueprintFromElement(root, element, meta, index, padding = 12) {
          const bbox = elementBBoxInRoot(root, element, meta);
          if (bbox.width <= 0.5 && bbox.height <= 0.5) return null;
          const componentName = element.getAttribute('data-editor-name') || `${element.tagName.toLowerCase()}-stroke-${index + 1}`;
          return {
            key: `auto-stroke-${index}`,
            name: componentName,
            isStrokeDecoration: true,
            sourceIndex: getTopLevelSvgChildren(root, meta).indexOf(element),
            originalBox: bbox,
            svg: nodeSvgFromElement(root, element, bbox, padding),
            width: Math.ceil(Math.max(24, bbox.width + padding * 2)),
            height: Math.ceil(Math.max(24, bbox.height + padding * 2)),
          };
        }

        function mergeBBoxes(boxes) {
          if (!boxes.length) return { x: 0, y: 0, width: 10, height: 10 };
          const minX = Math.min(...boxes.map((box) => box.x));
          const minY = Math.min(...boxes.map((box) => box.y));
          const maxX = Math.max(...boxes.map((box) => box.x + box.width));
          const maxY = Math.max(...boxes.map((box) => box.y + box.height));
          return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
        }

        function pointDistanceToBox(point, box) {
          const dx = Math.max(box.x - point.x, 0, point.x - (box.x + box.width));
          const dy = Math.max(box.y - point.y, 0, point.y - (box.y + box.height));
          return Math.hypot(dx, dy);
        }

        function nearestSideForPoint(box, point) {
          const distances = [
            { side: 'top', value: Math.abs(point.y - box.y) },
            { side: 'right', value: Math.abs(point.x - (box.x + box.width)) },
            { side: 'bottom', value: Math.abs(point.y - (box.y + box.height)) },
            { side: 'left', value: Math.abs(point.x - box.x) },
          ];
          distances.sort((a, b) => a.value - b.value);
          return distances[0].side;
        }

        function nearestNodeForPoint(point, nodeBoxes) {
          let best = null;
          for (const nodeBox of nodeBoxes) {
            const distance = pointDistanceToBox(point, nodeBox.originalBox);
            if (!best || distance < best.distance) {
              best = { nodeBox, distance };
            }
          }
          return best?.nodeBox || null;
        }

        function addAutoSceneFromSvgAsset(asset, x = null, y = null) {
          const parser = new DOMParser();
          const doc = parser.parseFromString(asset.svg, 'image/svg+xml');
          const root = doc.documentElement;
          const meta = asset.meta;
          const children = getTopLevelSvgChildren(root, meta);
          const strokeElements = children.filter(isStrokeGraphicElement);
          const connectorElements = strokeElements.filter(isConnectorElement);
          const looseStrokeElements = strokeElements.filter((element) => !isConnectorElement(element));
          const semanticComponentElements = children.filter((element) => element.getAttribute('data-editor-group') === 'component');
          const componentElements = semanticComponentElements.length
            ? semanticComponentElements
            : children.filter((element) => !isStrokeGraphicElement(element));
          const decorationElements = semanticComponentElements.length
            ? children.filter((element) => !isStrokeGraphicElement(element) && element.getAttribute('data-editor-group') !== 'component')
            : [];
          const padding = 12;

          const componentBoxes = componentElements.map((element, index) => {
            const bbox = elementBBoxInRoot(root, element, meta);
            const componentName = element.getAttribute('data-editor-name') || `${element.tagName.toLowerCase()}-${index + 1}`;
            const sourceIndex = children.indexOf(element);
            return {
              key: `auto-${index}`,
              name: componentName,
              element,
              sourceIndex,
              originalBox: bbox,
              svg: nodeSvgFromElement(root, element, bbox, padding),
              width: Math.ceil(Math.max(24, bbox.width + padding * 2)),
              height: Math.ceil(Math.max(24, bbox.height + padding * 2)),
            };
          }).filter((item) => item.originalBox.width > 0.5 || item.originalBox.height > 0.5);

          const nodeBlueprints = [];
          if (decorationElements.length) {
            const decorationBoxes = decorationElements.map((element) => elementBBoxInRoot(root, element, meta));
            const decorationBBox = mergeBBoxes(decorationBoxes);
            nodeBlueprints.push({
              key: 'auto-decoration',
              name: 'background',
              isDecoration: true,
              sourceIndex: Math.min(...decorationElements.map((element) => children.indexOf(element))),
              originalBox: decorationBBox,
              svg: buildMultiElementSvg(root, decorationElements, decorationBBox, padding),
              width: Math.ceil(Math.max(24, decorationBBox.width + padding * 2)),
              height: Math.ceil(Math.max(24, decorationBBox.height + padding * 2)),
            });
          }
          looseStrokeElements.forEach((element, index) => {
            const blueprint = strokeBlueprintFromElement(root, element, meta, index, padding);
            if (blueprint) {
              blueprint.sourceIndex = children.indexOf(element);
              nodeBlueprints.push(blueprint);
            }
          });
          nodeBlueprints.push(...componentBoxes);
          nodeBlueprints.sort((a, b) => (a.sourceIndex || 0) - (b.sourceIndex || 0));

          if (!nodeBlueprints.length) {
            addNodeFromResolvedAsset(asset, x, y);
            return;
          }

          const minX = Math.min(...nodeBlueprints.map((item) => item.originalBox.x - padding));
          const minY = Math.min(...nodeBlueprints.map((item) => item.originalBox.y - padding));
          const maxX = Math.max(...nodeBlueprints.map((item) => item.originalBox.x + item.originalBox.width + padding));
          const maxY = Math.max(...nodeBlueprints.map((item) => item.originalBox.y + item.originalBox.height + padding));
          const groupWidth = maxX - minX;
          const groupHeight = maxY - minY;
          const anchor = fitInsertionAnchor(groupWidth, groupHeight, x, y);
          const startX = anchor.x;
          const startY = anchor.y;

          nodeBlueprints.forEach((item) => {
            const node = {
              id: uid('node'),
              assetId: null,
              fileName: `${asset.fileName}#${item.name}`,
              title: item.name,
              svg: item.svg,
              baseSvg: item.svg,
              textRuns: extractSvgTextRuns(item.svg),
              x: startX + item.originalBox.x - padding - minX,
              y: startY + item.originalBox.y - padding - minY,
              width: item.width,
              height: item.height,
              ratio: item.width / item.height || 1,
              z: ++state.zCounter,
            };
            item.nodeId = node.id;
            state.nodes.push(node);
          });

          const connectableBoxes = semanticComponentElements.length
            ? componentBoxes.filter((item) => !/title-block|export-frame/i.test(item.name))
            : nodeBlueprints.filter((item) => !item.isDecoration);

          connectorElements.forEach((element) => {
            const ends = connectorEndpoints(root, element, meta);
            if (!ends) {
              const fallbackBlueprint = strokeBlueprintFromElement(root, element, meta, children.indexOf(element), padding);
              if (fallbackBlueprint) {
                fallbackBlueprint.sourceIndex = children.indexOf(element);
                nodeBlueprints.push(fallbackBlueprint);
              }
              return;
            }
            const fromNode = nearestNodeForPoint(ends.start, connectableBoxes);
            const toNode = nearestNodeForPoint(ends.end, connectableBoxes);
            if (!fromNode || !toNode || fromNode.nodeId === toNode.nodeId) {
              const fallbackBlueprint = strokeBlueprintFromElement(root, element, meta, children.indexOf(element), padding);
              if (fallbackBlueprint) {
                fallbackBlueprint.sourceIndex = children.indexOf(element);
                nodeBlueprints.push(fallbackBlueprint);
              }
              return;
            }
            const rawPoints = connectorManualPoints(element);
            state.edges.push({
              id: uid('edge'),
              from: {
                nodeId: fromNode.nodeId,
                side: nearestSideForPoint(fromNode.originalBox, ends.start),
              },
              to: {
                nodeId: toNode.nodeId,
                side: nearestSideForPoint(toNode.originalBox, ends.end),
              },
              color: element.getAttribute('stroke') || '#3f6e8c',
              width: Number(element.getAttribute('stroke-width') || 4),
              dashed: Boolean(element.getAttribute('stroke-dasharray')),
              renderMode: 'foreground',
              manualPoints: rawPoints
                ? rawPoints.map((point) => ({
                    x: startX + point.x - minX,
                    y: startY + point.y - minY,
                  }))
                : null,
            });
          });

          nodeBlueprints
            .filter((item) => !item.nodeId)
            .sort((a, b) => (a.sourceIndex || 0) - (b.sourceIndex || 0))
            .forEach((item) => {
              const node = {
                id: uid('node'),
                assetId: null,
                fileName: `${asset.fileName}#${item.name}`,
                title: item.name,
                svg: item.svg,
                baseSvg: item.svg,
                textRuns: extractSvgTextRuns(item.svg),
                x: startX + item.originalBox.x - padding - minX,
                y: startY + item.originalBox.y - padding - minY,
                width: item.width,
                height: item.height,
                ratio: item.width / item.height || 1,
                z: ++state.zCounter,
              };
              item.nodeId = node.id;
              state.nodes.push(node);
            });

          setSingleNodeSelection(nodeBlueprints[nodeBlueprints.length - 1]?.nodeId || null);
          advanceInsertionAnchor(groupWidth, groupHeight, startX, startY);
        }

        function addNodeFromResolvedAsset(asset, x = null, y = null) {
          if (!asset) return;
          const width = DEFAULT_NODE_WIDTH;
          const height = Math.round(width / asset.meta.ratio);
          const anchor = fitInsertionAnchor(width, height, x, y);
          const posX = anchor.x;
          const posY = anchor.y;
          const node = {
            id: uid('node'),
            assetId: asset.id,
            fileName: asset.fileName,
            title: asset.title,
            svg: asset.svg,
            baseSvg: asset.svg,
            textRuns: extractSvgTextRuns(asset.svg),
            x: clamp(posX, 20, CANVAS_WIDTH - width - 20),
            y: clamp(posY, 20, CANVAS_HEIGHT - height - 20),
            width,
            height,
            ratio: asset.meta.ratio,
            z: ++state.zCounter,
          };
          state.nodes.push(node);
          setSingleNodeSelection(node.id);
          advanceInsertionAnchor(width, height, node.x, node.y);
        }

        function sceneTemplateBounds(scene) {
          const items = (scene?.nodes || []).map((templateNode) => {
            const asset = findAssetByFileName(templateNode.assetFileName, (candidate) => candidate.kind === 'svg');
            if (!asset) return null;
            const width = Number(templateNode.width || DEFAULT_NODE_WIDTH);
            const height = Number(templateNode.height || Math.round(width / asset.meta.ratio));
            return {
              left: templateNode.x,
              top: templateNode.y,
              right: templateNode.x + width,
              bottom: templateNode.y + height,
            };
          }).filter(Boolean);

          if (!items.length) {
            return { minX: 0, minY: 0, maxX: 0, maxY: 0, width: 0, height: 0 };
          }

          const minX = Math.min(...items.map((item) => item.left));
          const minY = Math.min(...items.map((item) => item.top));
          const maxX = Math.max(...items.map((item) => item.right));
          const maxY = Math.max(...items.map((item) => item.bottom));
          return {
            minX,
            minY,
            maxX,
            maxY,
            width: maxX - minX,
            height: maxY - minY,
          };
        }

        function addSceneFromTemplate(scene, x = null, y = null) {
          if (!scene || !Array.isArray(scene.nodes) || !scene.nodes.length) return;
          const bounds = sceneTemplateBounds(scene);
          const anchor = fitInsertionAnchor(bounds.width, bounds.height, x, y);
          const startX = anchor.x;
          const startY = anchor.y;
          const keyToNodeId = new Map();
          let lastNodeId = null;

          scene.nodes.forEach((templateNode) => {
            const asset = findAssetByFileName(templateNode.assetFileName, (candidate) => candidate.kind === 'svg');
            if (!asset) return;
            const width = Number(templateNode.width || DEFAULT_NODE_WIDTH);
            const height = Number(templateNode.height || Math.round(width / asset.meta.ratio));
            const node = {
              id: uid('node'),
              assetId: asset.id,
              fileName: asset.fileName,
              title: asset.title,
              svg: asset.svg,
              baseSvg: asset.svg,
              textRuns: extractSvgTextRuns(asset.svg),
              x: startX + templateNode.x - bounds.minX,
              y: startY + templateNode.y - bounds.minY,
              width,
              height,
              ratio: asset.meta.ratio,
              z: ++state.zCounter,
            };
            state.nodes.push(node);
            keyToNodeId.set(templateNode.key, node.id);
            lastNodeId = node.id;
          });

          (scene.edges || []).forEach((templateEdge) => {
            const fromNodeId = keyToNodeId.get(templateEdge.from?.key);
            const toNodeId = keyToNodeId.get(templateEdge.to?.key);
            if (!fromNodeId || !toNodeId) return;
            state.edges.push({
              id: uid('edge'),
              from: { nodeId: fromNodeId, side: templateEdge.from.side },
              to: { nodeId: toNodeId, side: templateEdge.to.side },
              color: templateEdge.color || '#3f6e8c',
              width: Number(templateEdge.width || 4),
              renderMode: templateEdge.renderMode || 'foreground',
              dashed: Boolean(templateEdge.dashed),
            });
          });

          setSingleNodeSelection(lastNodeId);
          advanceInsertionAnchor(bounds.width, bounds.height, startX, startY);
        }

        function addNodeFromAsset(assetId, x = null, y = null) {
          const asset = getAsset(assetId);
          if (!asset) return;
          if (isTopLevelFigureAsset(asset)) {
            addAutoSceneFromSvgAsset(asset, x, y);
            persistAndRender();
            return;
          }
          if (asset.kind === 'scene') {
            addSceneFromTemplate(asset.scene, x, y);
            persistAndRender();
            return;
          }
          const aliasSceneId = editableSceneAlias.get(asset.fileName);
          if (aliasSceneId) {
            const aliasScene = getAsset(aliasSceneId);
            if (aliasScene?.kind === 'scene') {
              addSceneFromTemplate(aliasScene.scene, x, y);
              persistAndRender();
              return;
            }
          }
          addNodeFromResolvedAsset(asset, x, y);
          persistAndRender();
        }

        function duplicateSelectedNode() {
          copySelected();
          pasteClipboard();
        }

        function removeSelected() {
          const selectedIds = selectedNodeIds();
          if (selectedIds.length) {
            const selectedSet = new Set(selectedIds);
            state.nodes = state.nodes.filter((item) => !selectedSet.has(item.id));
            state.edges = state.edges.filter((edge) => !selectedSet.has(edge.from.nodeId) && !selectedSet.has(edge.to.nodeId));
            state.selectedNodeId = null;
            state.selectedNodeIds = [];
          } else if (state.selectedEdgeId) {
            state.edges = state.edges.filter((edge) => edge.id !== state.selectedEdgeId);
            state.selectedEdgeId = null;
          }
          state.connectFrom = null;
          state.rewireEdge = null;
          hideContextMenu();
          persistAndRender();
        }

        function clearCanvas() {
          state.nodes = [];
          state.edges = [];
          state.selectedNodeId = null;
          state.selectedNodeIds = [];
          state.selectedEdgeId = null;
          state.connectFrom = null;
          state.rewireEdge = null;
          state.zCounter = 1;
          state.lastInsert = { x: 120, y: 120 };
          hideContextMenu();
          persistAndRender();
        }

        function toCanvasPoint(clientX, clientY) {
          const rect = el.workspaceCanvas.getBoundingClientRect();
          return {
            x: clientX - rect.left + el.workspaceViewport.scrollLeft,
            y: clientY - rect.top + el.workspaceViewport.scrollTop,
          };
        }

        function portPosition(node, side) {
          switch (side) {
            case 'top':
              return { x: node.x + node.width / 2, y: node.y };
            case 'right':
              return { x: node.x + node.width, y: node.y + node.height / 2 };
            case 'bottom':
              return { x: node.x + node.width / 2, y: node.y + node.height };
            default:
              return { x: node.x, y: node.y + node.height / 2 };
          }
        }

        function offsetPort(point, side, distance = 28) {
          if (side === 'top') return { x: point.x, y: point.y - distance };
          if (side === 'right') return { x: point.x + distance, y: point.y };
          if (side === 'bottom') return { x: point.x, y: point.y + distance };
          return { x: point.x - distance, y: point.y };
        }

        function polylinePoints(edge) {
          if (Array.isArray(edge.manualPoints) && edge.manualPoints.length >= 2) {
            return edge.manualPoints.map((point) => `${point.x},${point.y}`).join(' ');
          }
          const fromNode = state.nodes.find((item) => item.id === edge.from.nodeId);
          const toNode = state.nodes.find((item) => item.id === edge.to.nodeId);
          if (!fromNode || !toNode) return '';
          const start = portPosition(fromNode, edge.from.side);
          const end = portPosition(toNode, edge.to.side);
          const startLead = offsetPort(start, edge.from.side);
          const endLead = offsetPort(end, edge.to.side);

          const points = [start, startLead];

          const fromHorizontal = edge.from.side === 'left' || edge.from.side === 'right';
          const toHorizontal = edge.to.side === 'left' || edge.to.side === 'right';

          if (fromHorizontal && toHorizontal) {
            const midX = (startLead.x + endLead.x) / 2;
            points.push({ x: midX, y: startLead.y }, { x: midX, y: endLead.y });
          } else if (!fromHorizontal && !toHorizontal) {
            const midY = (startLead.y + endLead.y) / 2;
            points.push({ x: startLead.x, y: midY }, { x: endLead.x, y: midY });
          } else if (fromHorizontal) {
            points.push({ x: endLead.x, y: startLead.y });
          } else {
            points.push({ x: startLead.x, y: endLead.y });
          }

          points.push(endLead, end);
          return points.map((point) => `${point.x},${point.y}`).join(' ');
        }

        function clearManualPointsForNodeIds(nodeIds) {
          const set = new Set(nodeIds);
          state.edges.forEach((edge) => {
            if (set.has(edge.from.nodeId) || set.has(edge.to.nodeId)) {
              edge.manualPoints = null;
              edge.renderMode = 'foreground';
            }
          });
        }

        function renderEdges() {
          const previewMarkerIdForColor = (color) => `canvasArrowPreview-${String(color || '#3f6e8c').replace(/[^a-zA-Z0-9_-]/g, '_')}`;
          const previewDefsMarkup = `
            <defs>
              ${[...new Set(state.edges.map((edge) => edge.color || '#3f6e8c'))]
                .map((color) => `
                  <marker id="${previewMarkerIdForColor(color)}" viewBox="0 0 8 8" refX="6.2" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 8 4 L 0 8 z" fill="${color}"></path>
                  </marker>`)
                .join('')}
            </defs>
          `;
          const backgroundLines = state.edges
            .filter((edge) => edge.renderMode === 'background')
            .map((edge) => {
              const points = polylinePoints(edge);
              if (!points) return '';
              const dash = edge.dashed ? '10 10' : '';
              const color = edge.color || '#3f6e8c';
              const width = Number(edge.width || 4);
              return `<polyline class="edge-visible" points="${points}" stroke="${color}" stroke-width="${width}" stroke-dasharray="${dash}" marker-end="url(#${previewMarkerIdForColor(color)})"></polyline>`;
            })
            .join('');

          const foregroundLines = state.edges
            .filter((edge) => edge.renderMode !== 'background')
            .map((edge) => {
              const selected = edge.id === state.selectedEdgeId;
              const points = polylinePoints(edge);
              if (!points) return '';
              const dash = edge.dashed ? '10 10' : '';
              const color = edge.color || '#3f6e8c';
              const width = Number(edge.width || 4);
              return `
                <g class="${selected ? 'edge-selected' : ''}" data-edge-id="${edge.id}">
                  <polyline class="edge-hit" points="${points}"></polyline>
