services:
  postgres:
    image: postgres:16-alpine
    container_name: openslaw-postgres-prod
    restart: always
    ports:
      - "${DB_PORT:-51012}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-openslaw}
      POSTGRES_USER: ${DB_USER:-openslaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-in-production}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - openslaw-postgres-prod-data:/var/lib/postgresql/data
    networks:
      - openslaw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openslaw} -d ${DB_NAME:-openslaw}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: openslaw-backend-prod
    restart: always
    ports:
      - "${API_PORT:-51011}:51011"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 51011
      DATABASE_URL: postgresql://${DB_USER:-openslaw}:${DB_PASSWORD:-change-this-in-production}@postgres:5432/${DB_NAME:-openslaw}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:51010}
      SIGNUP_GRANT_AMOUNT: ${SIGNUP_GRANT_AMOUNT:-100}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-console}
      EMAIL_FROM: ${EMAIL_FROM:-OpenSlaw <noreply@example.com>}
      EMAIL_EXPOSE_DEBUG_SECRETS: ${EMAIL_EXPOSE_DEBUG_SECRETS:-false}
      OWNER_LINK_MASTER_KEY: ${OWNER_LINK_MASTER_KEY:-replace-me}
      CALLBACK_MASTER_KEY: ${CALLBACK_MASTER_KEY:-replace-me}
      SYSTEM_CRON_TOKEN: ${SYSTEM_CRON_TOKEN:-replace-me}
      OWNER_CLAIM_TTL_HOURS: ${OWNER_CLAIM_TTL_HOURS:-168}
      OWNER_LOGIN_LINK_TTL_MINUTES: ${OWNER_LOGIN_LINK_TTL_MINUTES:-30}
      OWNER_SESSION_TTL_HOURS: ${OWNER_SESSION_TTL_HOURS:-168}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-OpenSlaw}
      PLATFORM_MANAGED_DELIVERY_ENABLED: ${PLATFORM_MANAGED_DELIVERY_ENABLED:-false}
      PLATFORM_MANAGED_ARTIFACT_MAX_BYTES: ${PLATFORM_MANAGED_ARTIFACT_MAX_BYTES:-31457280}
      PLATFORM_MANAGED_ARTIFACT_TOTAL_BYTES_PER_ORDER_SIDE: ${PLATFORM_MANAGED_ARTIFACT_TOTAL_BYTES_PER_ORDER_SIDE:-31457280}
      PLATFORM_MANAGED_ARTIFACT_MEMBER_MAX_BYTES: ${PLATFORM_MANAGED_ARTIFACT_MEMBER_MAX_BYTES:-1073741824}
      PLATFORM_MANAGED_ARTIFACT_MEMBER_TOTAL_BYTES_PER_ORDER_SIDE: ${PLATFORM_MANAGED_ARTIFACT_MEMBER_TOTAL_BYTES_PER_ORDER_SIDE:-1073741824}
      PLATFORM_MANAGED_DOWNLOAD_MAX_CONCURRENT: ${PLATFORM_MANAGED_DOWNLOAD_MAX_CONCURRENT:-15}
      PLATFORM_MANAGED_DOWNLOAD_MAX_CONCURRENT_PER_AGENT: ${PLATFORM_MANAGED_DOWNLOAD_MAX_CONCURRENT_PER_AGENT:-4}
      PLATFORM_MANAGED_DOWNLOAD_MAX_CONCURRENT_PER_IP: ${PLATFORM_MANAGED_DOWNLOAD_MAX_CONCURRENT_PER_IP:-6}
      PLATFORM_MANAGED_DOWNLOAD_RATE_LIMIT_PER_IP: ${PLATFORM_MANAGED_DOWNLOAD_RATE_LIMIT_PER_IP:-40}
      PLATFORM_MANAGED_DOWNLOAD_RATE_LIMIT_WINDOW_SECONDS: ${PLATFORM_MANAGED_DOWNLOAD_RATE_LIMIT_WINDOW_SECONDS:-60}
      PLATFORM_MANAGED_LARGE_ARTIFACT_PENDING_RETENTION_HOURS: ${PLATFORM_MANAGED_LARGE_ARTIFACT_PENDING_RETENTION_HOURS:-48}
      PLATFORM_MANAGED_LARGE_ARTIFACT_TERMINAL_RETENTION_DAYS: ${PLATFORM_MANAGED_LARGE_ARTIFACT_TERMINAL_RETENTION_DAYS:-7}
      PLATFORM_MANAGED_STALE_UPLOADING_TTL_HOURS: ${PLATFORM_MANAGED_STALE_UPLOADING_TTL_HOURS:-24}
      PLATFORM_MANAGED_STALE_UPLOADED_TTL_HOURS: ${PLATFORM_MANAGED_STALE_UPLOADED_TTL_HOURS:-168}
      PLATFORM_MANAGED_COMPLETED_RETENTION_DAYS: ${PLATFORM_MANAGED_COMPLETED_RETENTION_DAYS:-90}
      PLATFORM_MANAGED_DISPUTED_RETENTION_DAYS: ${PLATFORM_MANAGED_DISPUTED_RETENTION_DAYS:-180}
      PLATFORM_MANAGED_CLEANUP_BATCH_LIMIT: ${PLATFORM_MANAGED_CLEANUP_BATCH_LIMIT:-100}
      OSS_SIGNED_UPLOAD_EXPIRES_SECONDS: ${OSS_SIGNED_UPLOAD_EXPIRES_SECONDS:-900}
      OSS_OPENSLAW_DELIVERY_PREFIX: ${OSS_OPENSLAW_DELIVERY_PREFIX:-ai/openslaw/orders}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_INTERNAL_ENDPOINT: ${OSS_INTERNAL_ENDPOINT:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      REGISTER_RATE_LIMIT_PER_IP: ${REGISTER_RATE_LIMIT_PER_IP:-3}
      REGISTER_RATE_LIMIT_WINDOW_SECONDS: ${REGISTER_RATE_LIMIT_WINDOW_SECONDS:-60}
      REGISTER_EMAIL_COOLDOWN_SECONDS: ${REGISTER_EMAIL_COOLDOWN_SECONDS:-60}
      OWNER_CLAIM_EMAIL_COOLDOWN_SECONDS: ${OWNER_CLAIM_EMAIL_COOLDOWN_SECONDS:-60}
      OWNER_LOGIN_RATE_LIMIT_PER_IP: ${OWNER_LOGIN_RATE_LIMIT_PER_IP:-6}
      OWNER_LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${OWNER_LOGIN_RATE_LIMIT_WINDOW_SECONDS:-60}
      OWNER_LOGIN_EMAIL_COOLDOWN_SECONDS: ${OWNER_LOGIN_EMAIL_COOLDOWN_SECONDS:-60}
      OWNER_CLAIM_RATE_LIMIT_PER_IP: ${OWNER_CLAIM_RATE_LIMIT_PER_IP:-10}
      OWNER_CLAIM_RATE_LIMIT_WINDOW_SECONDS: ${OWNER_CLAIM_RATE_LIMIT_WINDOW_SECONDS:-60}
      RUNTIME_RELAY_LEASE_HOURS: ${RUNTIME_RELAY_LEASE_HOURS:-48}
      RUNTIME_RELAY_PREMIUM_LEASE_HOURS: ${RUNTIME_RELAY_PREMIUM_LEASE_HOURS:-480}
      RUNTIME_RELAY_AUTH_TIMEOUT_SECONDS: ${RUNTIME_RELAY_AUTH_TIMEOUT_SECONDS:-10}
      RUNTIME_RELAY_SWEEP_INTERVAL_SECONDS: ${RUNTIME_RELAY_SWEEP_INTERVAL_SECONDS:-60}
      RUNTIME_RELAY_PENDING_REPLAY_BATCH_SIZE: ${RUNTIME_RELAY_PENDING_REPLAY_BATCH_SIZE:-100}
      RUNTIME_RELAY_MAX_CONNECTIONS: ${RUNTIME_RELAY_MAX_CONNECTIONS:-1000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - openslaw-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:51011/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openslaw-frontend-prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-51010}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - openslaw-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  openslaw-network:
    driver: bridge

volumes:
  openslaw-postgres-prod-data:
    driver: local
